<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>こえで ジャンプ</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1>🎤 こえで ジャンプ</h1>
  <div class="spacer"></div>
</header>

<main>
  <div id="selectScreen" class="panel">
    <h2>こえを だすと キャラが とぶよ!</h2>
    <p style="font-size:20px">「わーーー!」って いっぱい こえを だしてね</p>
    <div class="gallery" id="gallery"></div>

    <div class="mode-sec">🌈 ゆるふわ<span class="tag">こえで ふわふわ・タイマーなし(1〜2さいから)</span></div>
    <div class="row"><button class="btn big pink" data-mode="yuru">🌈 ふわふわ あそぶ</button></div>

    <div class="mode-sec">🎵 れんしゅう<span class="tag">45びょうで ⭐を あつめるだけ</span></div>
    <div class="row"><button class="btn big blue" data-mode="ren">🎵 ⭐あつめ(45びょう)</button></div>

    <div class="mode-sec">🔥 ガチンコ<span class="tag">⭐ノルマ&ランキング・クリアで つぎが とけるよ</span></div>
    <div class="row" id="gachiRow">
      <button class="btn big blue"   data-mode="g1">かんたん<br><span style="font-size:14px">⭐8こ</span></button>
      <button class="btn big orange" data-mode="g2">ふつう<br><span style="font-size:14px">⭐12こ</span></button>
      <button class="btn big purple" data-mode="g3">むずかしい<br><span style="font-size:14px">⭐16こ</span></button>
    </div>
    <div class="rank" id="rankView"></div>
    <p class="note" id="micNote">マイクの使用を「許可」してください。マイクが使えないときは、がめんを「おしているあいだ」うきあがります。</p>
  </div>

  <div id="playScreen" class="hidden">
    <div class="hud"><span id="scoreHud">⭐ 0</span><span id="timeHud">⏰ 45</span></div>
    <div class="stage-wrap"><canvas id="cv" class="stage" width="1280" height="720"></canvas></div>
    <div class="row hidden" id="endRow">
      <button class="btn big green" id="againBtn">もういちど</button>
      <button class="btn gray" id="backBtn">えらびなおす</button>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/rig.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");
const GROUND = 640;
const GAME = "voice";
const RANK_LABELS = ["かんたん", "ふつう", "むずかしい"];
const MODES = {
  yuru: { label: "ゆるふわ", yuru: true },
  ren:  { label: "れんしゅう", time: 45 },
  g1: { label: "かんたん",   time: 45, goal: 8,  lv: 1 },
  g2: { label: "ふつう",     time: 45, goal: 12, lv: 2 },
  g3: { label: "むずかしい", time: 45, goal: 16, lv: 3 },
};

let selChar = null, G = null, mic = null;

async function initSelect() {
  const recs = await Store.ensureSamples();
  const chars = recs.filter((r) => r.cat === "char");
  selChar = chars[0];
  Ui.renderGallery($("gallery"), chars, (r, el) => {
    selChar = r;
    document.querySelectorAll("#gallery .thumb").forEach((t) => t.classList.remove("selected"));
    el.classList.add("selected");
  }, selChar && selChar.id);
}
initSelect();

async function setupMic() {
  if (mic) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const actx = Sound.ensure();
    const src = actx.createMediaStreamSource(stream);
    const an = actx.createAnalyser();
    an.fftSize = 512;
    src.connect(an);
    mic = { an, buf: new Uint8Array(an.fftSize) };
    return true;
  } catch (e) {
    return false;
  }
}

function volume() {
  if (!mic) return 0;
  mic.an.getByteTimeDomainData(mic.buf);
  let sum = 0;
  for (let i = 0; i < mic.buf.length; i++) {
    const v = (mic.buf[i] - 128) / 128;
    sum += v * v;
  }
  return Math.sqrt(sum / mic.buf.length);   // 0〜1くらい
}

/* タッチフォールバック */
let pressing = false;
cv.addEventListener("pointerdown", () => { pressing = true; });
window.addEventListener("pointerup", () => { pressing = false; });

function refreshLocks() {
  const lv = Tiers.unlock(GAME);
  document.querySelectorAll("#gachiRow .btn").forEach((b) => {
    const need = MODES[b.dataset.mode].lv;
    if (!b.dataset.orig) b.dataset.orig = b.innerHTML;
    b.classList.toggle("locked", need > lv);
    b.innerHTML = (need > lv ? "🔒 " : "") + b.dataset.orig;
  });
  $("rankView").innerHTML = Tiers.rankHtml(GAME, RANK_LABELS, { unit: "こ" });
}
refreshLocks();

document.querySelectorAll("#selectScreen [data-mode]").forEach((b) => {
  b.onclick = async () => {
    const m = MODES[b.dataset.mode];
    if (m.lv && m.lv > Tiers.unlock(GAME)) {
      Sound.bad();
      Ui.msg("まえのだんかいを クリアしてね", 1600, "#4dabf7");
      return;
    }
    Sound.tap();
    const hasMic = await setupMic();
    if (!hasMic) $("micNote").textContent = "マイクが使えないので、がめんをおしているあいだ うきあがります!";
    start(m);
  };
});
$("againBtn").onclick = () => start(G.mode);
$("backBtn").onclick = () => {
  if (G) G.stop = true;
  $("playScreen").classList.add("hidden");
  $("selectScreen").classList.remove("hidden");
  refreshLocks();
};

async function start(mode) {
  if (G) G.stop = true;
  const parts = await Rig.load(selChar);
  const puppet = new Puppet(parts, { x: 300, y: GROUND, h: 170, facing: 1 });
  G = { stop: false, mode, y: GROUND, vy: 0, stars: [], score: 0, t: mode.time || 0, spawn: 0, over: false, cleared: false };

  $("selectScreen").classList.add("hidden");
  $("playScreen").classList.remove("hidden");
  $("endRow").classList.add("hidden");
  $("timeHud").classList.toggle("hidden", !mode.time);
  updateScoreHud();

  const starCv = Util.emojiCanvas("⭐", 84);
  const cloudCv = Util.emojiCanvas("☁️", 140);
  const clouds = Array.from({ length: 4 }, () => ({ x: Util.rand(0, 1280), y: Util.rand(40, 300), v: Util.rand(15, 40) }));
  let last = performance.now();
  const g = G;

  (function loop(now) {
    if (g.stop) return;
    const dt = Math.min(0.04, (now - last) / 1000); last = now;

    if (!g.over && g.mode.time) {
      g.t -= dt;
      if (g.t <= 0) { g.t = 0; finish(); }
    }

    /* こえ(またはタッチ)で うきあがる */
    const vol = Math.max(volume(), pressing ? 0.25 : 0);
    const lift = Util.clamp((vol - 0.04) * 26000, 0, 5200);
    g.vy += (1500 - lift) * dt;              // 重力 - うきあがる力
    g.vy = Util.clamp(g.vy, -620, 700);
    g.y = Util.clamp(g.y + g.vy * dt, 130, GROUND);
    if (g.y === GROUND && g.vy > 0) g.vy = 0;
    if (g.y === 130 && g.vy < 0) g.vy = 0;

    /* ほし */
    g.spawn -= dt;
    if (g.spawn <= 0 && !g.over) {
      g.spawn = Util.rand(0.9, 1.5);
      g.stars.push({ x: 1330, y: Util.rand(160, GROUND - 60), t: 0 });
    }
    for (const s of g.stars) { s.x -= 230 * dt; s.t += dt; }
    g.stars = g.stars.filter((s) => s.x > -60);
    const py = g.y - puppet.h / 2;
    for (const s of g.stars) {
      if (!s.got && Math.abs(s.x - 300) < 75 && Math.abs(s.y - py) < 90) {
        s.got = true; s.x = -999;
        Sound.pop();
        if (!g.mode.yuru) {
          g.score++;
          updateScoreHud();
          if (g.mode.goal && !g.cleared && g.score >= g.mode.goal) {
            g.cleared = true;
            Ui.msg("ノルマ クリア!⭐", 1200, "#51cf66");  // のこり時間で もっと あつめよう
          }
        }
      }
    }
    if (g.mode.time) $("timeHud").textContent = `⏰ ${Math.ceil(g.t)}`;

    puppet.walking = g.y >= GROUND - 2;
    puppet.update(dt);

    /* --- 描画 --- */
    ctx.clearRect(0, 0, 1280, 720);
    const sky = ctx.createLinearGradient(0, 0, 0, 720);
    sky.addColorStop(0, "#74c0fc"); sky.addColorStop(1, "#e7f5ff");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, 1280, 720);
    for (const c of clouds) {
      c.x -= c.v * dt;
      if (c.x < -150) c.x = 1350;
      ctx.drawImage(cloudCv, c.x, c.y);
    }
    ctx.fillStyle = "#96d06c"; ctx.fillRect(0, GROUND + 10, 1280, 720 - GROUND);

    for (const s of g.stars) ctx.drawImage(starCv, s.x - 42, s.y - 42 + Math.sin(s.t * 4) * 6);

    puppet.x = 300; puppet.y = GROUND;
    puppet.draw(ctx, GROUND - g.y);

    /* こえメーター */
    ctx.fillStyle = "rgba(255,255,255,.75)";
    ctx.beginPath(); ctx.roundRect(30, 80, 44, 560, 22); ctx.fill();
    const mh = Util.clamp(vol * 4, 0, 1) * 552;
    const mg = ctx.createLinearGradient(0, 640, 0, 88);
    mg.addColorStop(0, "#51cf66"); mg.addColorStop(0.6, "#ffd43b"); mg.addColorStop(1, "#ff6b9d");
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.roundRect(34, 636 - mh, 36, mh + 2, 18); ctx.fill();
    ctx.font = "34px serif"; ctx.fillText("🎤", 24, 700);

    requestAnimationFrame(loop);
  })(last);

  function finish() {
    g.over = true;
    Sound.fanfare();
    if (g.mode.goal) {
      Tiers.addRank(GAME, g.mode.lv, (selChar && selChar.name) || "?", g.score);
      if (g.cleared) {
        Tiers.setUnlock(GAME, Math.min(3, g.mode.lv + 1));
        Ui.confetti();
        Ui.msg(`クリア!🏆 ⭐${g.score}こ!`, 3000);
      } else {
        Ui.msg(`ざんねん!⭐${g.score}/${g.mode.goal}こ`, 3000, "#9775fa");
      }
    } else {
      if (g.score >= 10) Ui.confetti();
      Ui.msg(`⭐ ${g.score}こ あつめた!`, 3000);
    }
    $("endRow").classList.remove("hidden");
  }
}

function updateScoreHud() {
  if (!G) return;
  if (G.mode.yuru) $("scoreHud").textContent = "こえを だそう!🎤";
  else if (G.mode.goal) $("scoreHud").textContent = `⭐ ${G.score} / ${G.mode.goal}`;
  else $("scoreHud").textContent = `⭐ ${G.score}`;
}
</script>
</body>
</html>
