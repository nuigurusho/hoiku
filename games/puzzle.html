<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>おえかきパズル</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1><img class="bar-icon" src="../assets/buttons/puzzle.png" alt=""> おえかきパズル</h1>
  <div class="spacer"></div>
</header>

<main>
  <!-- えらぶ画面 -->
  <div id="selectScreen">
    <div class="panel">
      <h2>どの えで あそぶ?</h2>
      <div class="gallery" id="gallery"></div>

      <div class="mode-sec">🧩 ピースの かたち<span class="tag">えらんでね</span></div>
      <div class="row" id="shapeRow">
        <button class="btn big green"  data-shape="wavy">🌊 なみなみ</button>
        <button class="btn big orange" data-shape="classic">🧩 パズル</button>
      </div>

      <div class="mode-sec">🌈 ゆるふわ<span class="tag">じどうで くみあがるのを みるだけ(1〜2さいから)</span></div>
      <div class="row"><button class="btn big pink" data-mode="demo">🌈 じどうで くみたてる</button></div>

      <div class="mode-sec">🎵 れんしゅう<span class="tag">じかんむせいげん・ピースのかずを えらんでね</span></div>
      <div class="row" id="countRow">
        <button class="btn big blue"   data-mode="ren4">4</button>
        <button class="btn big green"  data-mode="ren6">6</button>
        <button class="btn big orange" data-mode="ren9">9</button>
        <button class="btn big purple" data-mode="ren12">12</button>
        <button class="btn big pink"   data-mode="ren20">20</button>
      </div>

      <div class="mode-sec">🔥 ガチンコ<span class="tag">タイムアタック・はやさランキング・クリアで つぎが とけるよ</span></div>
      <div class="row" id="gachiRow">
        <button class="btn big blue"   data-mode="g1">かんたん<br><span style="font-size:14px">12ピース・90びょう</span></button>
        <button class="btn big orange" data-mode="g2">ふつう<br><span style="font-size:14px">20ピース・120びょう</span></button>
        <button class="btn big purple" data-mode="g3">むずかしい<br><span style="font-size:14px">30ピース・180びょう</span></button>
      </div>
      <div class="rank" id="rankView"></div>
      <p class="note">えをえらんでから、モードのボタンをおしてね(小さい子は 🌈 か 4 がおすすめ)</p>
    </div>
  </div>

  <!-- あそぶ画面 -->
  <div id="playScreen" class="hidden">
    <div class="hud"><span id="progress"></span><span id="timeHud" class="hidden"></span></div>
    <div class="stage-wrap"><canvas id="cv" class="stage" width="1280" height="800"></canvas></div>
    <div class="row"><button class="btn gray" id="againBtn">べつの えで あそぶ</button></div>
  </div>
</main>

<script src="../js/core.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const GRID = { 4: [2, 2], 6: [3, 2], 9: [3, 3], 12: [4, 3], 20: [5, 4], 30: [6, 5] };
const GAME = "puzzle";
const RANK_LABELS = ["かんたん", "ふつう", "むずかしい"];
const MODES = {
  demo:  { label: "ゆるふわ", count: 6, demo: true },
  ren4:  { label: "れんしゅう", count: 4 },
  ren6:  { label: "れんしゅう", count: 6 },
  ren9:  { label: "れんしゅう", count: 9 },
  ren12: { label: "れんしゅう", count: 12 },
  ren20: { label: "れんしゅう", count: 20 },
  g1: { label: "かんたん",   count: 12, limit: 90,  lv: 1 },
  g2: { label: "ふつう",     count: 20, limit: 120, lv: 2 },
  g3: { label: "むずかしい", count: 30, limit: 180, lv: 3 },
};

let selected = null;
let game = null;
let shapeStyle = "wavy";   // "wavy" = なみなみ / "classic" = 一般的なパズル形状

async function initSelect() {
  const recs = await Store.ensureSamples();
  selected = recs[0] || null;
  Ui.renderGallery($("gallery"), recs, (r, el) => {
    selected = r;
    document.querySelectorAll("#gallery .thumb").forEach((t) => t.classList.remove("selected"));
    el.classList.add("selected");
  }, selected && selected.id);
  refreshLocks();
}
initSelect();

function refreshLocks() {
  const lv = Tiers.unlock(GAME);
  document.querySelectorAll("#gachiRow .btn").forEach((b) => {
    const need = MODES[b.dataset.mode].lv;
    if (!b.dataset.orig) b.dataset.orig = b.innerHTML;
    b.classList.toggle("locked", need > lv);
    b.innerHTML = (need > lv ? "🔒 " : "") + b.dataset.orig;
  });
  $("rankView").innerHTML = Tiers.rankHtml(GAME, RANK_LABELS, { unit: "びょう" });
}

// ピースの かたち えらび
(function initShapePicker() {
  const btns = document.querySelectorAll("#shapeRow [data-shape]");
  const paint = () => btns.forEach((b) => b.classList.toggle("sel", b.dataset.shape === shapeStyle));
  btns.forEach((b) => {
    b.onclick = () => { shapeStyle = b.dataset.shape; Sound.tap(); paint(); };
  });
  paint();
})();

document.querySelectorAll("#selectScreen [data-mode]").forEach((b) => {
  b.onclick = async () => {
    const m = MODES[b.dataset.mode];
    if (m.lv && m.lv > Tiers.unlock(GAME)) {
      Sound.bad();
      Ui.msg("まえのだんかいを クリアしてね", 1600, "#4dabf7");
      return;
    }
    if (!selected) { Ui.msg("えを えらんでね", 1200, "#4dabf7"); return; }
    Sound.tap();
    await startGame(selected, m);
  };
});
$("againBtn").onclick = () => {
  if (game) game.stop = true;
  $("playScreen").classList.add("hidden");
  $("selectScreen").classList.remove("hidden");
  refreshLocks();
};

/* ---------------- パズル本体 ---------------- */
async function startGame(rec, mode) {
  if (game) game.stop = true;
  const count = mode.count;
  const img = await Util.loadImage(rec.dataURL);
  const cv = $("cv"), ctx = cv.getContext("2d");
  const [cols, rows] = GRID[count];

  // ボード(左側)に画像をフィット
  const bx = 40, by = 50, bmaxW = 770, bmaxH = 700;
  const sc = Math.min(bmaxW / img.width, bmaxH / img.height);
  const bw = Math.round(img.width * sc), bh = Math.round(img.height * sc);
  const board = Util.makeCanvas(bw, bh);
  board.getContext("2d").drawImage(img, 0, 0, bw, bh);

  const pw = bw / cols, ph = bh / rows;
  const amp = Math.min(pw, ph) * 0.18;   // なみなみ形状のゆれ幅

  // ふちのランダム曲線(となりあうピースで共有するので ぴったり かみあう)
  const wavyEdge = (x1, y1, x2, y2) => {
    const N = 8, pts = [];
    let off = 0;
    for (let i = 0; i <= N; i++) {
      const t = i / N;
      if (i === 0 || i === N) off = 0;
      else off = Util.clamp(off + Util.rand(-amp * 0.7, amp * 0.7), -amp, amp);
      const nx = -(y2 - y1), ny = x2 - x1;                 // 法線方向
      const nl = Math.hypot(nx, ny) || 1;
      pts.push([x1 + (x2 - x1) * t + (nx / nl) * off,
                y1 + (y2 - y1) * t + (ny / nl) * off]);
    }
    return pts;
  };

  // 一般的なパズル形状:出っぱり(タブ)と くぼみが かみあう クラシックなジグソー
  // ふち沿いの座標(a=位置 0..1 / p=法線オフセット)を つくって 実座標へ変換する
  const classicEdge = (x1, y1, x2, y2) => {
    const dx = x2 - x1, dy = y2 - y1;
    const L = Math.hypot(dx, dy) || 1;
    const tx = dx / L, ty = dy / L;                        // 接線(単位)
    const nx = -ty, ny = tx;                               // 法線(単位)
    const dir = Math.random() < 0.5 ? 1 : -1;              // タブの向き(出/入)をランダムに
    const cx = 0.5 + Util.rand(-0.03, 0.03);               // こぶの中心(位置)
    const cy = 0.12 + Util.rand(-0.02, 0.02);              // こぶの中心(高さ)
    const r  = 0.11 + Util.rand(-0.01, 0.01);              // こぶの半径
    const neck = 0.44;                                     // かたの長さ
    const tpl = [[0, 0], [neck, 0]];                       // かた → くび
    const th0 = 210 * Math.PI / 180, th1 = -30 * Math.PI / 180, STEPS = 14;
    for (let i = 0; i <= STEPS; i++) {                     // まるい こぶ
      const th = th0 + (th1 - th0) * (i / STEPS);
      tpl.push([cx + r * Math.cos(th), cy + r * Math.sin(th)]);
    }
    tpl.push([1 - neck, 0], [1, 0]);                       // くび → かた
    return tpl.map(([a, p]) => [
      x1 + tx * (a * L) + nx * (p * dir * L),
      y1 + ty * (a * L) + ny * (p * dir * L),
    ]);
  };

  const interiorEdge = shapeStyle === "classic" ? classicEdge : wavyEdge;
  const straightEdge = (x1, y1, x2, y2) => [[x1, y1], [x2, y2]];
  // タブの はみ出しぶんを見こんだ よゆう(クラシックは 大きめに とる)
  const protrude = shapeStyle === "classic" ? Math.max(pw, ph) * 0.26 : amp;
  const margin = Math.ceil(protrude + 8);

  // hE[r][c]: 上下方向の境界線(r=0..rows) / vE[c][r]: 左右方向の境界線(c=0..cols)
  const hE = [], vE = [];
  for (let r = 0; r <= rows; r++) {
    hE[r] = [];
    for (let c = 0; c < cols; c++) {
      const f = (r === 0 || r === rows) ? straightEdge : interiorEdge;
      hE[r][c] = f(c * pw, r * ph, (c + 1) * pw, r * ph);
    }
  }
  for (let c = 0; c <= cols; c++) {
    vE[c] = [];
    for (let r = 0; r < rows; r++) {
      const f = (c === 0 || c === cols) ? straightEdge : interiorEdge;
      vE[c][r] = f(c * pw, r * ph, c * pw, (r + 1) * ph);
    }
  }

  // ピースを切り出す
  const pieces = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const path = [
        ...hE[r][c],
        ...vE[c + 1][r].slice(1),
        ...hE[r + 1][c].slice().reverse().slice(1),
        ...vE[c][r].slice().reverse().slice(1),
      ];
      const px = c * pw - margin, py = r * ph - margin;
      const pc = Util.makeCanvas(Math.ceil(pw + margin * 2), Math.ceil(ph + margin * 2));
      const pctx = pc.getContext("2d");
      pctx.save();
      pctx.translate(-px, -py);
      pctx.beginPath();
      path.forEach(([x, y], i) => (i === 0 ? pctx.moveTo(x, y) : pctx.lineTo(x, y)));
      pctx.closePath();
      pctx.clip();
      pctx.drawImage(board, 0, 0);
      pctx.restore();
      // ふちどり
      pctx.save();
      pctx.translate(-px, -py);
      pctx.beginPath();
      path.forEach(([x, y], i) => (i === 0 ? pctx.moveTo(x, y) : pctx.lineTo(x, y)));
      pctx.closePath();
      pctx.strokeStyle = "rgba(255,255,255,.9)"; pctx.lineWidth = 3; pctx.stroke();
      pctx.strokeStyle = "rgba(0,0,0,.25)"; pctx.lineWidth = 1.5; pctx.stroke();
      pctx.restore();

      pieces.push({
        cv: pc,
        tx: bx + px, ty: by + py,                    // 正解位置
        x: Util.rand(850, 1280 - pc.width - 10),     // トレイにばらまく
        y: Util.rand(60, 800 - pc.height - 20),
        locked: false,
      });
    }
  }

  // 吸着はんい:ピースの大きさに応じて ゆるめに(小さい子でも はまりやすく)
  const snapDist = Math.max(50, Math.min(pw, ph) * 0.55);

  game = { cv, ctx, board, bx, by, bw, bh, pieces, drag: null, done: false,
           mode, stop: false, elapsed: 0, snapDist };
  $("selectScreen").classList.add("hidden");
  $("playScreen").classList.remove("hidden");
  $("timeHud").classList.toggle("hidden", !mode.limit);
  render();

  if (mode.demo) {
    cv.onpointerdown = cv.onpointermove = cv.onpointerup = null;  // みるだけ(そうさなし)
    runDemo();
  } else {
    bindPointer();
    if (mode.limit) startTimer();
  }
}

/* ガチンコ:せいげんじかんの カウントダウン */
function startTimer() {
  let last = performance.now();
  (function tick(now) {
    const g = game;
    if (!g || g.stop || g.done) return;
    g.elapsed += (now - last) / 1000; last = now;
    const rem = Math.max(0, g.mode.limit - g.elapsed);
    $("timeHud").textContent = `⏰ ${Math.ceil(rem)}`;
    if (rem <= 0) {
      g.done = true;
      Sound.bad();
      const left = g.pieces.filter((p) => !p.locked).length;
      Ui.msg(`じかんぎれ!のこり ${left}ピース`, 2400, "#9775fa");
      return;
    }
    requestAnimationFrame(tick);
  })(last);
}

/* 🌈 ゆるふわ:ピースが じどうで はまっていくデモ */
function runDemo() {
  const g = game;
  const queue = Util.shuffle(g.pieces.slice());
  let i = 0;
  const step = () => {
    if (!g || g.stop) return;
    if (i >= queue.length) {
      g.done = true;
      Sound.fanfare();
      Ui.confetti();
      Ui.msg("かんせい!", 2200);
      setTimeout(() => { if (g && !g.stop && g.mode.demo) startGame(selected, g.mode); }, 2800);
      return;
    }
    const pc = queue[i];
    const from = { x: pc.x, y: pc.y };
    const t0 = performance.now();
    const DUR = 420;
    (function fly(now) {
      if (!g || g.stop) return;
      const k = Math.min(1, (now - t0) / DUR);
      const e = 1 - (1 - k) * (1 - k);   // ease-out
      pc.x = from.x + (pc.tx - from.x) * e;
      pc.y = from.y + (pc.ty - from.y) * e;
      render();
      if (k < 1) { requestAnimationFrame(fly); return; }
      pc.x = pc.tx; pc.y = pc.ty; pc.locked = true;
      Sound.pop();
      render();
      i++;
      setTimeout(step, 260);
    })(t0);
  };
  setTimeout(step, 500);
}

function updateProgress() {
  const left = game.pieces.filter((p) => !p.locked).length;
  $("progress").textContent = left ? `のこり ${left} ピース` : "かんせい!🎉";
}

function render() {
  const g = game, ctx = g.ctx;
  ctx.clearRect(0, 0, g.cv.width, g.cv.height);
  // トレイ背景
  ctx.fillStyle = "#fdf3e3";
  ctx.fillRect(830, 20, 430, 760);
  // ボード:うすいガイド
  ctx.save();
  ctx.globalAlpha = 0.13;
  ctx.drawImage(g.board, g.bx, g.by, g.bw, g.bh);
  ctx.restore();
  ctx.strokeStyle = "#c8b295";
  ctx.setLineDash([10, 8]);
  ctx.lineWidth = 3;
  ctx.strokeRect(g.bx - 4, g.by - 4, g.bw + 8, g.bh + 8);
  ctx.setLineDash([]);
  // ピース:はまったもの → うごかせるもの の順
  for (const p of g.pieces) if (p.locked) ctx.drawImage(p.cv, p.tx, p.ty);
  for (const p of g.pieces) {
    if (p.locked) continue;
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,.3)";
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 4;
    ctx.drawImage(p.cv, p.x, p.y);
    ctx.restore();
  }
  updateProgress();
}

function bindPointer() {
  const cv = game.cv;
  cv.onpointerdown = (e) => {
    const g = game;
    if (g.done) return;
    const p = Util.canvasPos(cv, e);
    // 上に描かれているものから順にさがす(透明部分は無視)
    for (let i = g.pieces.length - 1; i >= 0; i--) {
      const pc = g.pieces[i];
      if (pc.locked) continue;
      const lx = p.x - pc.x, ly = p.y - pc.y;
      if (lx < 0 || ly < 0 || lx >= pc.cv.width || ly >= pc.cv.height) continue;
      const a = pc.cv.getContext("2d").getImageData(Math.floor(lx), Math.floor(ly), 1, 1).data[3];
      if (a < 20) continue;
      g.pieces.splice(i, 1);
      g.pieces.push(pc);                       // いちばん上へ
      g.drag = { pc, dx: lx, dy: ly };
      Sound.tap();
      cv.setPointerCapture(e.pointerId);
      render();
      return;
    }
  };
  cv.onpointermove = (e) => {
    if (!game.drag) return;
    const p = Util.canvasPos(cv, e);
    game.drag.pc.x = p.x - game.drag.dx;
    game.drag.pc.y = p.y - game.drag.dy;
    render();
  };
  cv.onpointerup = () => {
    const g = game;
    if (!g.drag) return;
    const pc = g.drag.pc;
    g.drag = null;
    if (Math.hypot(pc.x - pc.tx, pc.y - pc.ty) < g.snapDist) {   // スナップ!
      pc.x = pc.tx; pc.y = pc.ty; pc.locked = true;
      Sound.pop();
      if (g.pieces.every((q) => q.locked)) {
        g.done = true;
        Sound.fanfare();
        Ui.confetti();
        if (g.mode.limit) {
          const secs = Math.max(1, Math.round(g.elapsed));
          Tiers.setUnlock(GAME, Math.min(3, g.mode.lv + 1));
          Tiers.addRank(GAME, g.mode.lv, "?", secs, { lowerIsBetter: true });
          Ui.msg(`クリア!🏆 ${secs}びょう`, 2400);
        } else {
          Ui.msg("かんせい!", 2200);
        }
      }
    }
    render();
  };
}
</script>
</body>
</html>
