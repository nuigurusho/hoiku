<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>さかさクイズ</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  /* お題のことば。ボタンに見えないよう枠(border/box-shadow/背景)はつけない */
  .word-box {
    margin: 12px auto 2px;
    padding: 4px 16px;
    max-width: 620px;
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--ink);
  }
  /* ことばの下の ローマ字 */
  .word-romaji {
    margin: 0 auto 4px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #8a7a68;
  }
  /* さかさもじモードで もとのキーワードを見せる行 */
  .word-sub {
    margin: 0 auto 12px;
    font-size: 19px;
    font-weight: bold;
    color: #4a3f35;
  }
  .step-title { font-size: 22px; font-weight: bold; margin: 4px 0; }
  #recDot { color: #fa5252; }
  .mode-desc { font-size: 15px; font-weight: normal; }
  .qnum { text-align: center; font-size: 20px; font-weight: bold; color: #8a7a68; margin-top: 10px; }
  .stars { text-align: center; font-size: 46px; letter-spacing: 6px; }
  /* こえを もういちど きく まるボタン(アイコンだけ) */
  .play-icon {
    font-size: 34px;
    width: 72px;
    height: 72px;
    padding: 0;
    border-radius: 50%;
  }
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1><img class="bar-icon" src="../assets/buttons/voice.png" alt=""> さかさクイズ</h1>
  <div class="spacer"></div>
</header>

<main>
  <!-- ========== あそびかた えらび ========== -->
  <div id="modeScreen">
    <div class="panel">
      <h2>あそびかたを えらんでね</h2>
      <div class="row">
        <button class="btn big green" id="modeMojiBtn">🔤 さかさもじ<br>
          <span class="mode-desc">キーワードを さかさに よんで ろくおん(かんたん)</span></button>
        <button class="btn big purple" id="modeRevBtn">🔁 ぎゃくさいせい<br>
          <span class="mode-desc">ふつうに よんだ こえを きかいが さかさまに(むずかしい)</span></button>
      </div>
      <p class="note">
        つくるひとが もんだいを 5もん ろくおん → こたえるひとが 4たくで こたえるよ。
        マイクは <b>localhost か https</b> で つかえます。ろくおんした こえは <b>ほぞんされません</b>。
      </p>
    </div>
  </div>

  <!-- ========== つくるひと パート(5もん れんぞく) ========== -->
  <div id="makeScreen" class="hidden">
    <div class="panel">
      <div class="step-title" id="makeTitle">🎙 つくるひと の ばん</div>
      <div class="qnum" id="makeQnum"></div>
      <p class="note" id="makeNote"></p>
      <div class="word-box" id="wordBox">ことば</div>
      <div class="word-romaji" id="wordRomaji"></div>
      <div class="word-sub hidden" id="wordSub"></div>
      <div class="row">
        <button class="btn yellow" id="anotherBtn">🔀 べつの ことば</button>
      </div>
      <div class="row">
        <button class="btn big pink" id="recBtn"><span id="recDot">🔴</span> ろくおん</button>
        <button class="btn big gray hidden" id="stopBtn">⏹ ていし</button>
        <button class="btn big blue hidden" id="previewBtn">🔊 きいてみる</button>
      </div>
      <p class="note" id="makeHint" style="min-height:22px"></p>
      <div class="row">
        <button class="btn big gray" id="prevBtn">← もどる</button>
        <button class="btn big green" id="nextBtn">つぎへ →</button>
      </div>
    </div>
  </div>

  <!-- ========== かんせい → ゲームせつめい ========== -->
  <div id="readyScreen" class="hidden">
    <div class="panel">
      <h2>もんだい かんせい!</h2>
      <p style="font-size:22px; font-weight:bold" id="readyNote"></p>
      <p class="note">こえは なんかいでも きけるよ。ぜんもん せいかい めざして がんばろう!</p>
      <div class="row">
        <button class="btn big pink" id="startBtn">▶ ゲームかいし</button>
      </div>
    </div>
  </div>

  <!-- ========== こたえるひと パート(4たく) ========== -->
  <div id="quizScreen" class="hidden">
    <div class="qnum" id="qnum"></div>
    <p style="text-align:center; font-weight:bold; margin:6px" id="quizNote"></p>
    <div class="row" style="margin:8px 0">
      <button class="btn blue play-icon" id="replayBtn" title="もういちど きく">🔊</button>
    </div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- ========== クリアがめん ========== -->
  <div id="endScreen" class="panel hidden">
    <h2>おしまい!</h2>
    <div class="stars" id="stars"></div>
    <p style="font-size:26px; font-weight:bold" id="scoreText"></p>
    <div class="row">
      <button class="btn big green" id="retryBtn">もういちど こたえる</button>
      <button class="btn big yellow" id="newBtn">あたらしい もんだいを つくる</button>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const N_Q = 5;

/* 保育園児が わかることば(約60語) */
const WORDS = [
  "りんご", "ばなな", "みかん", "いちご", "ぶどう", "すいか", "めろん", "とまと",
  "にんじん", "たまねぎ", "きゅうり", "いぬ", "ねこ", "うさぎ", "ぞう", "きりん",
  "ぱんだ", "らいおん", "くま", "さる", "とり", "さかな", "かえる", "かめ",
  "ぺんぎん", "ひよこ", "うし", "ぶた", "うま", "ちょうちょ", "でんしゃ", "くるま",
  "ひこうき", "ふね", "じてんしゃ", "ばす", "ろけっと", "あめ", "ゆき", "にじ",
  "たいよう", "つき", "ほし", "くも", "はな", "やま", "うみ", "そら",
  "ぼうし", "くつ", "かさ", "とけい", "でんわ", "ほん", "こっぷ", "おにぎり",
  "ぱん", "たまご", "けーき", "せんせい", "ともだち",
];

/* あそびかた(モード)
   moji: さかさもじ … キーワードを さかさに よんで ろくおん → そのまま再生
   rev : ぎゃくさいせい … ふつうに よんで ろくおん → 逆再生 */
let mode = "moji";
const MODE_TXT = {
  moji: {
    makeNote: "キーワードを さかさに よんでみよう! したの さかさことばを そのまま よんで ろくおんしてね(さいちょう10びょう)。",
    ready: "さかさに よんだ こえが 5もん ながれるよ。もとの ことばを 4つの なかから えらんでね!",
    quizNote: "さかさに よんだ こえを きいて、もとの ことばを えらぼう!",
  },
  rev: {
    makeNote: "でた ことばを、はっきり こえに だして ろくおんしてね(さいちょう10びょう)。きかいが さかさに して あそぶよ!",
    ready: "さかさまに なった こえが 5もん ながれるよ。もとの ことばを 4つの なかから えらんでね!",
    quizNote: "さかさまの こえを きいて、もとの ことばを えらぼう!",
  },
};

/* もんだい5もんぶん(端末内のみ・保存しない) */
let questions = [];   // [{word, normal:AudioBuffer, reversed:AudioBuffer}]
let cur = 0;          // 作成中のもんだい番号
let playIdx = 0, score = 0, busy = false;

/* ろくおんの じょうたい */
const rec = { mr: null, stream: null, chunks: [], key: null, timer: 0, tick: 0, t0: 0 };

/* --- ひらがな → ローマ字(ヘボン式ふう) --- */
const ROMA2 = {
  "きゃ": "kya", "きゅ": "kyu", "きょ": "kyo", "しゃ": "sha", "しゅ": "shu", "しょ": "sho",
  "ちゃ": "cha", "ちゅ": "chu", "ちょ": "cho", "にゃ": "nya", "にゅ": "nyu", "にょ": "nyo",
  "ひゃ": "hya", "ひゅ": "hyu", "ひょ": "hyo", "みゃ": "mya", "みゅ": "myu", "みょ": "myo",
  "りゃ": "rya", "りゅ": "ryu", "りょ": "ryo", "ぎゃ": "gya", "ぎゅ": "gyu", "ぎょ": "gyo",
  "じゃ": "ja", "じゅ": "ju", "じょ": "jo", "ぢゃ": "ja", "ぢゅ": "ju", "ぢょ": "jo",
  "びゃ": "bya", "びゅ": "byu", "びょ": "byo", "ぴゃ": "pya", "ぴゅ": "pyu", "ぴょ": "pyo",
};
const ROMA1 = {
  "あ": "a", "い": "i", "う": "u", "え": "e", "お": "o",
  "か": "ka", "き": "ki", "く": "ku", "け": "ke", "こ": "ko",
  "さ": "sa", "し": "shi", "す": "su", "せ": "se", "そ": "so",
  "た": "ta", "ち": "chi", "つ": "tsu", "て": "te", "と": "to",
  "な": "na", "に": "ni", "ぬ": "nu", "ね": "ne", "の": "no",
  "は": "ha", "ひ": "hi", "ふ": "fu", "へ": "he", "ほ": "ho",
  "ま": "ma", "み": "mi", "む": "mu", "め": "me", "も": "mo",
  "や": "ya", "ゆ": "yu", "よ": "yo",
  "ら": "ra", "り": "ri", "る": "ru", "れ": "re", "ろ": "ro",
  "わ": "wa", "を": "o", "ん": "n",
  "が": "ga", "ぎ": "gi", "ぐ": "gu", "げ": "ge", "ご": "go",
  "ざ": "za", "じ": "ji", "ず": "zu", "ぜ": "ze", "ぞ": "zo",
  "だ": "da", "ぢ": "ji", "づ": "zu", "で": "de", "ど": "do",
  "ば": "ba", "び": "bi", "ぶ": "bu", "べ": "be", "ぼ": "bo",
  "ぱ": "pa", "ぴ": "pi", "ぷ": "pu", "ぺ": "pe", "ぽ": "po",
  "ぁ": "a", "ぃ": "i", "ぅ": "u", "ぇ": "e", "ぉ": "o", "ゃ": "ya", "ゅ": "yu", "ょ": "yo",
};
function toRomaji(kana) {
  let out = "";
  for (let i = 0; i < kana.length; i++) {
    const two = kana.slice(i, i + 2);
    if (ROMA2[two]) { out += ROMA2[two]; i++; continue; }
    const c = kana[i];
    if (c === "っ") {                                   // そくおん:次の子音をかさねる
      const nr = ROMA2[kana.slice(i + 1, i + 3)] || ROMA1[kana[i + 1]] || "";
      if (nr) out += nr[0];
      continue;
    }
    if (c === "ー") {                                   // ちょうおん:直前の母音をのばす
      const m = out.match(/[aiueo]$/);
      if (m) out += m[0];
      continue;
    }
    out += ROMA1[c] != null ? ROMA1[c] : c;
  }
  return out;
}

/* ことばを 音のまとまり(拗音は前の字とセット)ごとに さかさにする。
   りんご→ごんり、ちょうちょ→ちょうちょ、けーき→きーけ */
function reverseMora(kana) {
  const small = "ゃゅょぁぃぅぇぉ";
  const units = [];
  for (const ch of kana) {
    if (small.indexOf(ch) >= 0 && units.length) units[units.length - 1] += ch;
    else units.push(ch);
  }
  return units.reverse().join("");
}

/* このモードで こたえるひとに 聞かせる音 */
function quizBufOf(q) { return q && (mode === "moji" ? q.normal : q.reversed); }

/* 5もんで かぶらないように ことばを えらぶ */
function pickUniqueWord() {
  const used = questions.map((q) => q.word).filter(Boolean);
  let w;
  do { w = Util.choice(WORDS); } while (used.indexOf(w) >= 0);
  return w;
}

/* --- 画面の切りかえ --- */
const SCREENS = ["modeScreen", "makeScreen", "readyScreen", "quizScreen", "endScreen"];
function showScreen(id) {
  SCREENS.forEach((s) => $(s).classList.toggle("hidden", s !== id));
}

function setMode(m) {
  mode = m;
  Sound.tap();
  questions = Array.from({ length: N_Q }, () => ({ word: null, normal: null, reversed: null }));
  questions[0].word = pickUniqueWord();
  cur = 0;
  showScreen("makeScreen");
  renderMake();
}

/* --- つくるひと画面の表示更新 --- */
function renderMake() {
  const q = questions[cur];
  $("makeQnum").textContent = `もんだい ${cur + 1} / ${N_Q}`;
  $("makeNote").textContent = MODE_TXT[mode].makeNote;
  if (mode === "moji") {
    const sakasa = reverseMora(q.word);
    $("wordBox").textContent = sakasa;
    $("wordRomaji").textContent = toRomaji(sakasa);
    $("wordSub").textContent = `もとの キーワード: ${q.word}`;
    $("wordSub").classList.remove("hidden");
  } else {
    $("wordBox").textContent = q.word;
    $("wordRomaji").textContent = toRomaji(q.word);
    $("wordSub").classList.add("hidden");
  }
  const recorded = !!q.normal;
  $("previewBtn").classList.toggle("hidden", !recorded);
  $("recBtn").innerHTML = recorded ? '<span id="recDot">🔴</span> とりなおす' : '<span id="recDot">🔴</span> ろくおん';
  $("makeHint").textContent = recorded
    ? (cur === N_Q - 1 ? "✅ ろくおんずみ!「かんせい」で クイズへ!" : "✅ ろくおんずみ!「つぎへ」で つぎの もんだいへ")
    : "";
  showRecBtn(false);
  $("prevBtn").style.visibility = cur === 0 ? "hidden" : "visible";
  $("nextBtn").textContent = cur === N_Q - 1 ? "✔ かんせい" : "つぎへ →";
}

function showRecBtn(recording) {
  $("recBtn").classList.toggle("hidden", recording);
  $("stopBtn").classList.toggle("hidden", !recording);
  if (recording) $("previewBtn").classList.add("hidden");
}

/* --- Web Audio: デコードと さかさバッファ作成 --- */
async function decodeBlob(blob) {
  const actx = Sound.ensure();
  const arr = await blob.arrayBuffer();
  return actx.decodeAudioData(arr);
}
function reverseBuffer(buf) {
  const actx = Sound.ensure();
  const rev = actx.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    const src = buf.getChannelData(ch);
    const dst = rev.getChannelData(ch);
    for (let i = 0, j = src.length - 1; i < src.length; i++, j--) dst[i] = src[j];
  }
  return rev;
}
let curSrc = null;   // 再生中のソース(連打でかぶらないように)
function playBuffer(bufr) {
  if (!bufr) return;
  const actx = Sound.ensure();
  if (curSrc) { try { curSrc.stop(); } catch (e) {} }
  const s = actx.createBufferSource();
  s.buffer = bufr;
  s.connect(actx.destination);
  s.start();
  curSrc = s;
}

/* --- ろくおん --- */
async function startRec() {
  if (rec.key) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    $("makeHint").textContent = "このブラウザでは マイクが つかえません(Chrome推奨)。";
    Sound.bad();
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    $("makeHint").textContent = "マイクが つかえません。localhost か https で ひらいて、マイクを「きょか」してね。";
    Sound.bad();
    return;
  }
  let mr;
  try { mr = new MediaRecorder(stream); }
  catch (e) {
    $("makeHint").textContent = "このブラウザは ろくおんに たいおうしていません(Chrome推奨)。";
    stream.getTracks().forEach((t) => t.stop());
    return;
  }
  rec.stream = stream;
  rec.mr = mr;
  rec.key = "rec";
  rec.chunks = [];
  mr.ondataavailable = (e) => { if (e.data && e.data.size) rec.chunks.push(e.data); };
  mr.onstop = () => onRecStop();
  mr.start();
  showRecBtn(true);
  $("makeHint").textContent = "";
  Sound.tick();
  // カウントダウン & 10びょうで じどうていし
  rec.t0 = performance.now();
  clearInterval(rec.tick);
  rec.tick = setInterval(() => {
    const left = Math.max(0, 10 - Math.floor((performance.now() - rec.t0) / 1000));
    $("stopBtn").textContent = `⏹ ていし(のこり${left}びょう)`;
  }, 200);
  rec.timer = setTimeout(() => stopRec(), 10000);
}

function stopRec() {
  if (rec.mr && rec.mr.state !== "inactive") rec.mr.stop();
}

async function onRecStop() {
  clearTimeout(rec.timer);
  clearInterval(rec.tick);
  const blob = new Blob(rec.chunks, { type: (rec.mr && rec.mr.mimeType) || "audio/webm" });
  if (rec.stream) { rec.stream.getTracks().forEach((t) => t.stop()); rec.stream = null; }
  rec.mr = null;
  rec.key = null;
  if (!blob.size) {
    renderMake();
    $("makeHint").textContent = "うまく ろくおんできませんでした。もういちど どうぞ。";
    return;
  }
  try {
    const buf = await decodeBlob(blob);
    questions[cur].normal = buf;
    questions[cur].reversed = reverseBuffer(buf);
  } catch (e) {
    renderMake();
    $("makeHint").textContent = "おとの へんかんに しっぱいしました。もういちど どうぞ。";
    return;
  }
  Sound.pop();
  renderMake();
}

/* --- 5もんの ナビゲーション --- */
function goPrev() {
  if (cur === 0) return;
  Sound.tap();
  stopRec();
  cur--;
  renderMake();
}
function goNext() {
  if (!questions[cur].normal) {
    Sound.bad();
    Ui.msg("さきに ろくおんしてね", 1400, "#4dabf7");
    return;
  }
  Sound.tap();
  stopRec();
  if (cur < N_Q - 1) {
    cur++;
    if (!questions[cur].word) questions[cur].word = pickUniqueWord();
    renderMake();
  } else {
    // かんせい → ゲームせつめいへ
    $("readyNote").textContent = MODE_TXT[mode].ready;
    showScreen("readyScreen");
  }
}

/* --- こたえるひと(4たく) --- */
function startPlay() {
  Sound.tap();
  playIdx = 0;
  score = 0;
  showScreen("quizScreen");
  showQ();
}

function showQ() {
  const q = questions[playIdx];
  busy = false;
  $("qnum").textContent = `だい ${playIdx + 1} もん / ${N_Q} もん`;
  $("quizNote").textContent = MODE_TXT[mode].quizNote;
  // 4たく: せいかい + ほかのことば3つ(5もんの ことばは まぜない)
  const used = questions.map((x) => x.word);
  const others = Util.shuffle(WORDS.filter((w) => used.indexOf(w) < 0)).slice(0, 3);
  const choices = Util.shuffle([q.word].concat(others));
  const box = $("choices");
  box.innerHTML = "";
  choices.forEach((w, i) => {
    const b = document.createElement("button");
    b.className = `choice c${i}`;
    b.textContent = w;
    b.onclick = () => answer(w);
    box.appendChild(b);
  });
  playBuffer(quizBufOf(q));   // ひらいたら 1かいめは じどうで さいせい
}

function answer(w) {
  if (busy) return;
  busy = true;
  const q = questions[playIdx];
  const ok = w === q.word;
  document.querySelectorAll("#choices .choice").forEach((b) => {
    if (b.textContent === q.word) b.classList.add("correct");
    else b.classList.add("dim");
  });
  if (ok) {
    score++;
    Sound.good();
    Ui.msg("せいかい!⭕", 1100, "#51cf66");
  } else {
    Sound.bad();
    Ui.msg("ざんねん…", 1100, "#4dabf7");
  }
  setTimeout(() => {
    playIdx++;
    if (playIdx < N_Q) showQ();
    else finishPlay();
  }, 1500);
}

/* --- クリアがめん(4たくクイズと同様) --- */
function finishPlay() {
  showScreen("endScreen");
  const rate = score / N_Q;
  $("stars").textContent = rate === 1 ? "⭐⭐⭐" : rate >= 0.6 ? "⭐⭐" : "⭐";
  $("scoreText").textContent = `${N_Q}もん中 ${score}もん せいかい!`;
  Sound.fanfare();
  if (rate >= 0.6) Ui.confetti();
}

/* --- 左上の「← もどる」は 1つずつ もどる --- */
document.addEventListener("click", (e) => {
  const a = e.target.closest("a.back, a.back-float");
  if (!a) return;
  const vis = (id) => !$(id).classList.contains("hidden");
  if (vis("modeScreen")) return;   // ふつうに メニューへ
  e.preventDefault();
  Sound.tap();
  stopRec();
  if (vis("makeScreen")) showScreen("modeScreen");
  else if (vis("readyScreen")) { showScreen("makeScreen"); renderMake(); }   // 完成後も もどって調整できる
  else if (vis("quizScreen")) { $("readyNote").textContent = MODE_TXT[mode].ready; showScreen("readyScreen"); }
  else showScreen("modeScreen");   // endScreen から
});

/* --- ボタン配線 --- */
$("modeMojiBtn").onclick = () => setMode("moji");
$("modeRevBtn").onclick = () => setMode("rev");
$("anotherBtn").onclick = () => {
  Sound.tap();
  stopRec();
  // ことばを かえたら その もんだいの ろくおんは やりなおし
  questions[cur] = { word: pickUniqueWord(), normal: null, reversed: null };
  renderMake();
};
$("recBtn").onclick = () => startRec();
$("stopBtn").onclick = () => stopRec();
$("previewBtn").onclick = () => { Sound.tap(); playBuffer(quizBufOf(questions[cur])); };
$("prevBtn").onclick = () => goPrev();
$("nextBtn").onclick = () => goNext();
$("startBtn").onclick = () => startPlay();
$("replayBtn").onclick = () => playBuffer(quizBufOf(questions[playIdx]));
