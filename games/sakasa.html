<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>さかさクイズ</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  /* お題のことば。ボタンに見えないよう枠(border/box-shadow/背景)はつけない */
  .word-box {
    margin: 12px auto 2px;
    padding: 4px 16px;
    max-width: 620px;
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--ink);
  }
  .word-box.hidden-word { color: #cbb9a3; letter-spacing: 10px; }
  .word-box.answer { color: #e8590c; }
  /* ことばの下の ローマ字 */
  .word-romaji {
    margin: 0 auto 4px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #8a7a68;
  }
  /* さかさもじモードで もとのキーワードを見せる行 */
  .word-sub {
    margin: 0 auto 12px;
    font-size: 19px;
    font-weight: bold;
    color: #4a3f35;
  }
  .step-title { font-size: 22px; font-weight: bold; margin: 4px 0; }
  #recDot { color: #fa5252; }
  .mode-desc { font-size: 15px; font-weight: normal; }
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1><img class="bar-icon" src="../assets/buttons/voice.png" alt=""> さかさクイズ</h1>
  <div class="spacer"></div>
</header>

<main>
  <!-- ========== あそびかた えらび ========== -->
  <div id="modeScreen">
    <div class="panel">
      <h2>あそびかたを えらんでね</h2>
      <div class="row">
        <button class="btn big green" id="modeMojiBtn">🔤 さかさもじ<br>
          <span class="mode-desc">キーワードを さかさに よんで ろくおん(かんたん)</span></button>
        <button class="btn big purple" id="modeRevBtn">🔁 ぎゃくさいせい<br>
          <span class="mode-desc">ふつうに よんだ こえを きかいが さかさまに(むずかしい)</span></button>
      </div>
      <p class="note">
        どちらも、こたえるひとは こえを きいて もとの キーワードを あてます。
        マイクは <b>localhost か https</b> で つかえます。ろくおんした こえは <b>ほぞんされません</b>。
      </p>
    </div>
  </div>

  <!-- ========== つくるひと パート ========== -->
  <div id="makeScreen" class="hidden">
    <div class="panel">
      <div class="step-title" id="makeTitle">🎙 つくるひと の ばん</div>
      <p class="note" id="makeNote"></p>
      <div class="word-box" id="wordBox">ことば</div>
      <div class="word-romaji" id="wordRomaji"></div>
      <div class="word-sub hidden" id="wordSub"></div>
      <div class="row">
        <button class="btn yellow" id="anotherBtn">🔀 べつの ことば</button>
      </div>
      <div class="row">
        <button class="btn big pink" id="recBtn"><span id="recDot">🔴</span> ろくおん</button>
        <button class="btn big gray hidden" id="stopBtn">⏹ ていし</button>
      </div>
      <div class="row" id="afterRecRow" style="visibility:hidden">
        <button class="btn big blue" id="previewBtn">🔊 きいてみる</button>
        <button class="btn big green" id="useBtn">✔ この もんだいに する</button>
      </div>
      <p class="note" id="makeHint" style="min-height:22px"></p>
    </div>
  </div>

  <!-- ========== こたえるひと パート ========== -->
  <div id="answerScreen" class="hidden">
    <div class="panel">
      <div class="step-title">🙋 こたえるひと の ばん</div>
      <p class="note" id="answerNote"></p>
      <div class="word-box hidden-word" id="hiddenWord">❓ ❓ ❓</div>
      <div class="word-box answer hidden" id="answerWord">?</div>
      <div class="word-romaji hidden" id="answerRomaji"></div>
      <div class="row">
        <button class="btn big blue" id="playBtn">🔊 こえを きく</button>
      </div>
      <div class="row" id="judgeRow">
        <button class="btn big green" id="correctBtn">⭕ せいかい</button>
        <button class="btn big pink" id="wrongBtn">❌ ざんねん</button>
      </div>
      <p class="note" id="answerHint" style="min-height:22px">おとなの ひとが ⭕か❌を おしてね(こたえが でるよ)</p>
      <div class="row hidden" id="nextRow">
        <button class="btn big yellow" id="nextBtn">➡ つぎの もんだい</button>
      </div>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);

/* 保育園児が わかることば(約60語) */
const WORDS = [
  "りんご", "ばなな", "みかん", "いちご", "ぶどう", "すいか", "めろん", "とまと",
  "にんじん", "たまねぎ", "きゅうり", "いぬ", "ねこ", "うさぎ", "ぞう", "きりん",
  "ぱんだ", "らいおん", "くま", "さる", "とり", "さかな", "かえる", "かめ",
  "ぺんぎん", "ひよこ", "うし", "ぶた", "うま", "ちょうちょ", "でんしゃ", "くるま",
  "ひこうき", "ふね", "じてんしゃ", "ばす", "ろけっと", "あめ", "ゆき", "にじ",
  "たいよう", "つき", "ほし", "くも", "はな", "やま", "うみ", "そら",
  "ぼうし", "くつ", "かさ", "とけい", "でんわ", "ほん", "こっぷ", "おにぎり",
  "ぱん", "たまご", "けーき", "せんせい", "ともだち",
];

/* あそびかた(モード)
   moji: さかさもじ … キーワードを さかさに よんで ろくおん → そのまま再生
   rev : ぎゃくさいせい … ふつうに よんで ろくおん → 逆再生 */
let mode = "moji";
const MODE_TXT = {
  moji: {
    makeNote: "キーワードを さかさに よんでみよう! したの さかさことばを そのまま よんで ろくおんしてね(さいちょう10びょう)。",
    preview: "🔊 きいてみる",
    play: "🔊 こえを きく",
    answerNote: "さかさに よんだ こえを きいて、もとの ことばを あてよう!(なんかいでも きけるよ)",
  },
  rev: {
    makeNote: "でた ことばを、はっきり こえに だして ろくおんしてね(さいちょう10びょう)。きかいが さかさに して あそぶよ!",
    preview: "🔊 さかさを きく",
    play: "🔊 さかさを きく",
    answerNote: "さかさの こえを きいて、なんの ことばか あてよう!(なんかいでも きけるよ)",
  },
};

/* ろくおん & 再生の じょうたい(端末内のみ・保存しない) */
const rec = { mr: null, stream: null, chunks: [], key: null, normal: null, reversed: null, timer: 0, tick: 0, t0: 0 };
let word = "";

/* --- ひらがな → ローマ字(ヘボン式ふう) --- */
const ROMA2 = {
  "きゃ": "kya", "きゅ": "kyu", "きょ": "kyo", "しゃ": "sha", "しゅ": "shu", "しょ": "sho",
  "ちゃ": "cha", "ちゅ": "chu", "ちょ": "cho", "にゃ": "nya", "にゅ": "nyu", "にょ": "nyo",
  "ひゃ": "hya", "ひゅ": "hyu", "ひょ": "hyo", "みゃ": "mya", "みゅ": "myu", "みょ": "myo",
  "りゃ": "rya", "りゅ": "ryu", "りょ": "ryo", "ぎゃ": "gya", "ぎゅ": "gyu", "ぎょ": "gyo",
  "じゃ": "ja", "じゅ": "ju", "じょ": "jo", "ぢゃ": "ja", "ぢゅ": "ju", "ぢょ": "jo",
  "びゃ": "bya", "びゅ": "byu", "びょ": "byo", "ぴゃ": "pya", "ぴゅ": "pyu", "ぴょ": "pyo",
};
const ROMA1 = {
  "あ": "a", "い": "i", "う": "u", "え": "e", "お": "o",
  "か": "ka", "き": "ki", "く": "ku", "け": "ke", "こ": "ko",
  "さ": "sa", "し": "shi", "す": "su", "せ": "se", "そ": "so",
  "た": "ta", "ち": "chi", "つ": "tsu", "て": "te", "と": "to",
  "な": "na", "に": "ni", "ぬ": "nu", "ね": "ne", "の": "no",
  "は": "ha", "ひ": "hi", "ふ": "fu", "へ": "he", "ほ": "ho",
  "ま": "ma", "み": "mi", "む": "mu", "め": "me", "も": "mo",
  "や": "ya", "ゆ": "yu", "よ": "yo",
  "ら": "ra", "り": "ri", "る": "ru", "れ": "re", "ろ": "ro",
  "わ": "wa", "を": "o", "ん": "n",
  "が": "ga", "ぎ": "gi", "ぐ": "gu", "げ": "ge", "ご": "go",
  "ざ": "za", "じ": "ji", "ず": "zu", "ぜ": "ze", "ぞ": "zo",
  "だ": "da", "ぢ": "ji", "づ": "zu", "で": "de", "ど": "do",
  "ば": "ba", "び": "bi", "ぶ": "bu", "べ": "be", "ぼ": "bo",
  "ぱ": "pa", "ぴ": "pi", "ぷ": "pu", "ぺ": "pe", "ぽ": "po",
  "ぁ": "a", "ぃ": "i", "ぅ": "u", "ぇ": "e", "ぉ": "o", "ゃ": "ya", "ゅ": "yu", "ょ": "yo",
};
function toRomaji(kana) {
  let out = "";
  for (let i = 0; i < kana.length; i++) {
    const two = kana.slice(i, i + 2);
    if (ROMA2[two]) { out += ROMA2[two]; i++; continue; }
    const c = kana[i];
    if (c === "っ") {                                   // そくおん:次の子音をかさねる
      const nr = ROMA2[kana.slice(i + 1, i + 3)] || ROMA1[kana[i + 1]] || "";
      if (nr) out += nr[0];
      continue;
    }
    if (c === "ー") {                                   // ちょうおん:直前の母音をのばす
      const m = out.match(/[aiueo]$/);
      if (m) out += m[0];
      continue;
    }
    out += ROMA1[c] != null ? ROMA1[c] : c;
  }
  return out;
}

/* ことばを 音のまとまり(拗音は前の字とセット)ごとに さかさにする。
   りんご→ごんり、ちょうちょ→ちょうちょ、けーき→きーけ */
function reverseMora(kana) {
  const small = "ゃゅょぁぃぅぇぉ";
  const units = [];
  for (const ch of kana) {
    if (small.indexOf(ch) >= 0 && units.length) units[units.length - 1] += ch;
    else units.push(ch);
  }
  return units.reverse().join("");
}

/* このモードで こたえるひとに 聞かせる音 */
function quizBuf() { return mode === "moji" ? rec.normal : rec.reversed; }

/* --- ことば えらび(モードに合わせて 表示を切りかえ) --- */
function pickWord() {
  let w;
  do { w = Util.choice(WORDS); } while (w === word && WORDS.length > 1);
  word = w;
  if (mode === "moji") {
    const sakasa = reverseMora(word);
    $("wordBox").textContent = sakasa;
    $("wordRomaji").textContent = toRomaji(sakasa);
    $("wordSub").textContent = `もとの キーワード: ${word}`;
    $("wordSub").classList.remove("hidden");
  } else {
    $("wordBox").textContent = word;
    $("wordRomaji").textContent = toRomaji(word);
    $("wordSub").classList.add("hidden");
  }
}

function showRecBtn(recording) {
  $("recBtn").classList.toggle("hidden", recording);
  $("stopBtn").classList.toggle("hidden", !recording);
}

function resetMake() {
  pickWord();
  rec.normal = null;
  rec.reversed = null;
  $("makeNote").textContent = MODE_TXT[mode].makeNote;
  $("previewBtn").textContent = MODE_TXT[mode].preview;
  $("afterRecRow").style.visibility = "hidden";
  $("makeHint").textContent = "";
  showRecBtn(false);
}

function setMode(m) {
  mode = m;
  Sound.tap();
  $("modeScreen").classList.add("hidden");
  $("makeScreen").classList.remove("hidden");
  $("answerScreen").classList.add("hidden");
  word = "";           // モードが変わったら ことばも えらびなおす
  resetMake();
}

function backToModeSelect() {
  Sound.tap();
  stopRec();
  $("makeScreen").classList.add("hidden");
  $("answerScreen").classList.add("hidden");
  $("modeScreen").classList.remove("hidden");
}

/* 左上の「← もどる」は 1つずつ もどる:
   ろくおん・こたえる画面 → あそびかたえらび → メニュー */
document.addEventListener("click", (e) => {
  const a = e.target.closest("a.back, a.back-float");
  if (!a) return;
  if ($("modeScreen").classList.contains("hidden")) {
    e.preventDefault();
    backToModeSelect();
  }
});

/* --- Web Audio: デコードと さかさバッファ作成 --- */
async function decodeBlob(blob) {
  const actx = Sound.ensure();
  const arr = await blob.arrayBuffer();
  return actx.decodeAudioData(arr);
}
function reverseBuffer(buf) {
  const actx = Sound.ensure();
  const rev = actx.createBuffer(buf.numberOfChannels, buf.length, buf.sampleRate);
  for (let ch = 0; ch < buf.numberOfChannels; ch++) {
    const src = buf.getChannelData(ch);
    const dst = rev.getChannelData(ch);
    for (let i = 0, j = src.length - 1; i < src.length; i++, j--) dst[i] = src[j];
  }
  return rev;
}
let curSrc = null;   // 再生中のソース(連打でかぶらないように)
function playBuffer(bufr) {
  if (!bufr) return;
  const actx = Sound.ensure();
  if (curSrc) { try { curSrc.stop(); } catch (e) {} }
  const s = actx.createBufferSource();
  s.buffer = bufr;
  s.connect(actx.destination);
  s.start();
  curSrc = s;
}

/* --- ろくおん --- */
async function startRec() {
  if (rec.key) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    $("makeHint").textContent = "このブラウザでは マイクが つかえません(Chrome推奨)。";
    Sound.bad();
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    $("makeHint").textContent = "マイクが つかえません。localhost か https で ひらいて、マイクを「きょか」してね。";
    Sound.bad();
    return;
  }
  let mr;
  try { mr = new MediaRecorder(stream); }
  catch (e) {
    $("makeHint").textContent = "このブラウザは ろくおんに たいおうしていません(Chrome推奨)。";
    stream.getTracks().forEach((t) => t.stop());
    return;
  }
  rec.stream = stream;
  rec.mr = mr;
  rec.key = "rec";
  rec.chunks = [];
  rec.normal = null;
  rec.reversed = null;
  mr.ondataavailable = (e) => { if (e.data && e.data.size) rec.chunks.push(e.data); };
  mr.onstop = () => onRecStop();
  mr.start();
  showRecBtn(true);
  $("afterRecRow").style.visibility = "hidden";
  $("makeHint").textContent = "";
  Sound.tick();
  // カウントダウン & 10びょうで じどうていし
  rec.t0 = performance.now();
  clearInterval(rec.tick);
  rec.tick = setInterval(() => {
    const left = Math.max(0, 10 - Math.floor((performance.now() - rec.t0) / 1000));
    $("stopBtn").textContent = `⏹ ていし(のこり${left}びょう)`;
  }, 200);
  rec.timer = setTimeout(() => stopRec(), 10000);
}

function stopRec() {
  if (rec.mr && rec.mr.state !== "inactive") rec.mr.stop();
}

async function onRecStop() {
  clearTimeout(rec.timer);
  clearInterval(rec.tick);
  const blob = new Blob(rec.chunks, { type: (rec.mr && rec.mr.mimeType) || "audio/webm" });
  if (rec.stream) { rec.stream.getTracks().forEach((t) => t.stop()); rec.stream = null; }
  rec.mr = null;
  rec.key = null;
  showRecBtn(false);
  if (!blob.size) {
    $("makeHint").textContent = "うまく ろくおんできませんでした。もういちど どうぞ。";
    return;
  }
  try {
    rec.normal = await decodeBlob(blob);
    rec.reversed = reverseBuffer(rec.normal);
  } catch (e) {
    $("makeHint").textContent = "おとの へんかんに しっぱいしました。もういちど どうぞ。";
    return;
  }
  Sound.pop();
  $("afterRecRow").style.visibility = "visible";
  $("makeHint").textContent = `「${MODE_TXT[mode].preview.replace("🔊 ", "")}」で かくにん →「この もんだいに する」で こたえるひとへ!`;
}

/* --- こたえる画面へ --- */
function goAnswer() {
  if (!quizBuf()) return;
  Sound.tap();
  $("makeScreen").classList.add("hidden");
  $("answerScreen").classList.remove("hidden");
  $("answerNote").textContent = MODE_TXT[mode].answerNote;
  $("playBtn").textContent = MODE_TXT[mode].play;
  $("hiddenWord").classList.remove("hidden");
  $("answerWord").classList.add("hidden");
  $("answerWord").textContent = word;
  $("answerRomaji").textContent = toRomaji(word);
  $("answerRomaji").classList.add("hidden");
  $("judgeRow").classList.remove("hidden");
  $("nextRow").classList.add("hidden");
  $("answerHint").textContent = "おとなの ひとが ⭕か❌を おしてね(こたえが でるよ)";
  playBuffer(quizBuf());   // すぐ1かい きかせる
}

function reveal() {
  $("answerWord").classList.remove("hidden");
  $("answerRomaji").classList.remove("hidden");
  $("hiddenWord").classList.add("hidden");
  $("judgeRow").classList.add("hidden");
  $("nextRow").classList.remove("hidden");
  $("answerHint").textContent = `こたえは 「${word}」 でした!`;
}

function judge(ok) {
  reveal();
  if (ok) {
    Sound.fanfare();
    Ui.confetti();
    Ui.msg("せいかい!🎉", 1800, "#51cf66");
  } else {
    Sound.bad();
    Ui.msg("ざんねん…", 1500, "#9775fa");
  }
}

function backToMake() {
  Sound.tap();
  rec.normal = null;
  rec.reversed = null;
  $("answerScreen").classList.add("hidden");
  $("makeScreen").classList.remove("hidden");
  resetMake();
}

/* --- ボタン配線 --- */
$("modeMojiBtn").onclick = () => setMode("moji");
$("modeRevBtn").onclick = () => setMode("rev");
$("anotherBtn").onclick = () => { Sound.tap(); resetMake(); };
$("recBtn").onclick = () => startRec();
$("stopBtn").onclick = () => stopRec();
$("previewBtn").onclick = () => { Sound.tap(); playBuffer(quizBuf()); };
$("useBtn").onclick = () => goAnswer();
$("playBtn").onclick = () => { Sound.tap(); playBuffer(quizBuf()); };
$("correctBtn").onclick = () => judge(true);
$("wrongBtn").onclick = () => judge(false);
$("nextBtn").onclick = () => backToMake();
</script>
</body>
</html>
