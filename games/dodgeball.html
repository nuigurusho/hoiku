<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ドッヂボール</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  /* ===== ドッヂボール専用スタイル(1ファイル完結) ===== */

  /* --- チーム発表 --- */
  .db-teams {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 10px;
    max-width: 980px;
    margin: 10px auto;
    flex-wrap: nowrap;
  }
  .db-teamcol {
    flex: 1 1 0;
    min-width: 0;
    background: #fff;
    border-radius: 22px;
    border: 5px solid var(--cream-d);
    box-shadow: 0 6px 0 var(--cream-d);
    padding: 10px 8px 14px;
  }
  .db-teamcol.red  { border-color: var(--pink);   box-shadow: 0 6px 0 var(--pink-d);   background: #fff0f6; }
  .db-teamcol.blue { border-color: var(--blue);   box-shadow: 0 6px 0 var(--blue-d);   background: #e7f5ff; }
  .db-teamcol h3 { margin: 4px 0 8px; font-size: clamp(20px, 4.5vw, 30px); }
  .db-teamcol.red  h3 { color: var(--pink-d); }
  .db-teamcol.blue h3 { color: var(--blue-d); }
  .db-members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
    gap: 8px;
    min-height: 90px;
    align-content: start;
  }
  .db-mem {
    text-align: center;
    animation: db-pop .4s cubic-bezier(.2,1.6,.4,1) both;
  }
  .db-mem img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: contain;
    background: #fff;
    border-radius: 12px;
    border: 3px solid #eee2d0;
  }
  .db-mem .nm {
    font-size: 13px;
    font-weight: bold;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .db-vs {
    align-self: center;
    font-size: clamp(24px, 6vw, 46px);
    font-weight: bold;
    color: #a99;
    flex: 0 0 auto;
  }
  @keyframes db-pop { from { transform: scale(.2) rotate(-12deg); opacity: 0; } }

  /* --- 試合HUD(残り人数) --- */
  .db-hud {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: bold;
    font-size: clamp(20px, 5vw, 34px);
    margin: 6px 0 8px;
    flex-wrap: wrap;
  }
  .db-hud span { background: #fff; border-radius: 999px; padding: 4px 18px; box-shadow: 0 3px 0 rgba(150,110,70,.16); white-space: nowrap; }
  .db-hud .db-red  { color: var(--pink-d); }
  .db-hud .db-blue { color: var(--blue-d); }
  .db-hud .db-vslabel { background: none; box-shadow: none; color: #8a7a68; padding: 0 2px; }

  /* --- コート --- */
  .db-court {
    position: relative;
    width: 100%;
    max-width: 1000px;
    aspect-ratio: 4 / 3;
    max-height: calc(100vh - var(--bar-h) - 96px);
    margin: 0 auto;
    border-radius: 20px;
    overflow: hidden;
    background: #fbf7ee;
    box-shadow: 0 8px 24px rgba(120,80,40,.2);
    border: 4px solid #e8cbae;
    touch-action: none;
  }
  .db-zone { position: absolute; left: 0; right: 0; }
  .db-zone.red  { top: 0;    height: 50%; background: rgba(255,107,157,.12); }
  .db-zone.blue { bottom: 0; height: 50%; background: rgba(77,171,247,.12); }
  .db-bench {
    position: absolute; left: 0; right: 0; height: 15%;
    background: rgba(150,130,110,.10);
  }
  .db-bench.red  { top: 0; }
  .db-bench.blue { bottom: 0; }
  .db-centerline {
    position: absolute; left: 3%; right: 3%; top: 50%;
    height: 0; border-top: 5px dashed rgba(120,90,60,.35);
    transform: translateY(-50%);
  }

  /* --- キャラ --- */
  .db-player {
    position: absolute;
    width: 11%;
    transform: translate(-50%, -50%);
    z-index: 5;
    will-change: left, top;
    transition: left .12s linear, top .12s linear;
  }
  .db-player.dead {
    z-index: 2;
    opacity: .42;
    filter: grayscale(.5);
  }
  .db-pl-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: bottom center;
    animation: db-sway 2.4s ease-in-out infinite;
  }
  .db-player.dead .db-pl-inner { animation: none; }
  .db-player.win .db-pl-inner  { animation: db-jump .7s ease-in-out infinite; }
  .db-player img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,.18));
  }
  .db-player .db-plname {
    font-size: clamp(9px, 1.7vw, 15px);
    font-weight: bold;
    color: var(--ink);
    background: rgba(255,255,255,.8);
    border-radius: 999px;
    padding: 0 6px;
    max-width: 120%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: -2px;
  }
  .db-player.red  .db-plname { color: var(--pink-d); }
  .db-player.blue .db-plname { color: var(--blue-d); }
  .db-player.holder::after {
    content: "";
    position: absolute;
    inset: -6% -6% -6% -6%;
    border: 4px solid var(--yellow);
    border-radius: 18px;
    animation: db-glow 1s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes db-sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
  @keyframes db-jump { 0%,100% { transform: translateY(0) scale(1); } 40% { transform: translateY(-22px) scale(1.06); } }
  @keyframes db-glow { 0%,100% { opacity: .35; } 50% { opacity: 1; } }

  /* --- ボール --- */
  .db-ball {
    position: absolute;
    z-index: 20;
    font-size: clamp(26px, 6vw, 52px);
    line-height: 1;
    transform: translate(-50%, -50%);
    pointer-events: none;
    filter: drop-shadow(0 3px 3px rgba(0,0,0,.25));
  }

  /* --- バナー(だれが だれに あてた!など) --- */
  .db-banner {
    position: absolute;
    left: 50%; top: 20%;
    transform: translate(-50%, -50%);
    z-index: 40;
    max-width: 92%;
    text-align: center;
    font-weight: bold;
    font-size: clamp(18px, 4.4vw, 34px);
    line-height: 1.25;
    color: #fff;
    background: rgba(74,63,53,.92);
    border-radius: 18px;
    padding: 10px 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,.25);
    animation: db-banner-in .3s cubic-bezier(.2,1.6,.4,1) both;
    white-space: pre-line;
  }
  .db-banner.red  { background: rgba(214,51,108,.94); }
  .db-banner.blue { background: rgba(28,126,214,.94); }
  @keyframes db-banner-in { from { transform: translate(-50%,-50%) scale(.4); opacity: 0; } }

  /* --- 勝利画面 --- */
  .db-winners {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 14px auto 20px;
    max-width: 820px;
  }
  .db-winner {
    width: 108px;
    text-align: center;
    animation: db-jump .7s ease-in-out infinite;
  }
  .db-winner:nth-child(2n)   { animation-delay: .12s; }
  .db-winner:nth-child(3n)   { animation-delay: .24s; }
  .db-winner img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: contain;
    filter: drop-shadow(0 6px 4px rgba(0,0,0,.2));
  }
  .db-winner .nm { font-weight: bold; font-size: 15px; }
  #winTitle { font-size: clamp(28px, 7vw, 52px); margin: 6px 0 4px; }
  #winTitle.red  { color: var(--pink-d); }
  #winTitle.blue { color: var(--blue-d); }

  /* スマホ縦:ゲーム中は ヘッダーが「← もどる」フローティングになるので、
     人数HUDが それに かぶらないよう 上に すきまを あける */
  @media (max-width: 560px) {
    .db-hud { margin-top: 50px; font-size: clamp(18px, 4.6vw, 26px); }
    .db-court { max-height: calc(100vh - var(--bar-h) - 150px); }
    .db-player { width: 13%; }
  }
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1>🏐 ドッヂボール</h1>
  <div class="spacer"></div>
</header>

<main>
  <!-- 1. キャラ選択 -->
  <div id="selectScreen">
    <div class="panel">
      <h2>たたかう キャラを えらんでね<br><span style="font-size:18px;font-weight:normal;color:#8a7a68">(タッチで えらぶ / はずす)</span></h2>
      <div class="gallery" id="gallery"></div>
      <p class="note" id="selNote" style="font-size:17px;font-weight:bold;min-height:22px"></p>
      <div class="row"><button class="btn big pink" id="decideBtn">けってい!</button></div>
      <p class="note">えらんだ みんなが 2チームに わかれて、じどうで たいせんするよ。みているだけでOK!</p>
    </div>
  </div>

  <!-- 2. チーム発表 -->
  <div id="teamScreen" class="hidden">
    <h2 style="text-align:center;margin:10px 0 4px;font-size:clamp(22px,5vw,32px)">🎪 チームわけ!</h2>
    <div class="db-teams">
      <div class="db-teamcol red"><h3>🔴 あかチーム</h3><div class="db-members" id="redMembers"></div></div>
      <div class="db-vs">VS</div>
      <div class="db-teamcol blue"><h3>🔵 あおチーム</h3><div class="db-members" id="blueMembers"></div></div>
    </div>
    <div class="row" id="teamBtns">
      <button class="btn big yellow" id="redoBtn">やりなおす</button>
      <button class="btn big green"  id="startBtn">スタート!</button>
    </div>
  </div>

  <!-- 3. 試合(全自動) -->
  <div id="playScreen" class="hidden">
    <div class="db-hud">
      <span class="db-red"  id="hudRed">🔴あか 0にん</span>
      <span class="db-vslabel">vs</span>
      <span class="db-blue" id="hudBlue">🔵あお 0にん</span>
    </div>
    <div class="db-court" id="court">
      <div class="db-bench red"></div>
      <div class="db-zone red"></div>
      <div class="db-centerline"></div>
      <div class="db-zone blue"></div>
      <div class="db-bench blue"></div>
      <!-- キャラ・ボールは JS で挿入 -->
    </div>
  </div>

  <!-- 4. 勝利演出 -->
  <div id="winScreen" class="hidden">
    <div class="panel">
      <h2 id="winTitle">かち!</h2>
      <div class="db-winners" id="winners"></div>
      <div class="row">
        <button class="btn big pink"  id="rematchBtn">もういっかい しょうぶ!</button>
        <button class="btn big blue"  id="reselectBtn">メンバーを えらびなおす</button>
      </div>
      <div class="row">
        <button class="btn gray" id="topBtn">トップに もどる</button>
      </div>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);

/* ---- 画面きりかえ ---- */
const SCREENS = ["selectScreen", "teamScreen", "playScreen", "winScreen"];
function show(id) {
  for (const s of SCREENS) $(s).classList.toggle("hidden", s !== id);
}

/* ---- コート座標(%)の定数 ---- */
const XMIN = 12, XMAX = 88;
const RED_MIN = 20, RED_MAX = 44, RED_BENCH = 8;
const BLUE_MIN = 56, BLUE_MAX = 80, BLUE_BENCH = 92;
const CENTER = 50;

/* ---- 状態 ---- */
let allChars = [];
const selectedIds = new Set();
let roster = [];              // [{rec,name,voices}] えらばれたキャラ
let teams = { red: [], blue: [] };
let teamGen = 0;             // チーム発表の世代(やりなおし・離脱でキャンセル)
let M = null;               // 試合の状態
let rafId = 0;

/* ============================================================
   1. キャラ選択
   ============================================================ */
async function initSelect() {
  const recs = await Store.ensureSamples();
  allChars = recs.filter((r) => r.cat === "char");
  // さいしょは ぜんいん えらんでおく(サンプルだけでも すぐ あそべる)
  allChars.forEach((r) => selectedIds.add(r.id));
  renderGallery();
}
function renderGallery() {
  const el = $("gallery");
  el.innerHTML = "";
  for (const r of allChars) {
    const d = document.createElement("div");
    d.className = "thumb" + (selectedIds.has(r.id) ? " selected" : "");
    d.innerHTML = `<img src="${r.dataURL}" alt=""><div class="name">${r.name || ""}</div>`;
    d.onclick = () => {
      Sound.tap();
      selectedIds.has(r.id) ? selectedIds.delete(r.id) : selectedIds.add(r.id);
      renderGallery();
    };
    el.appendChild(d);
  }
  refreshDecide();
}
function refreshDecide() {
  const n = selectedIds.size;
  const btn = $("decideBtn"), note = $("selNote");
  if (n < 4) {
    btn.disabled = true;
    note.textContent = `あと ${4 - n}にん えらんでね(4にん いじょうで はじめられるよ)`;
    note.style.color = "#d6336c";
  } else {
    btn.disabled = false;
    note.textContent = `${n}にんで たいせん!`;
    note.style.color = "#2f9e44";
  }
}
$("decideBtn").onclick = () => {
  if (selectedIds.size < 4) { Sound.bad(); return; }
  Sound.pon();
  roster = allChars
    .filter((r) => selectedIds.has(r.id))
    .map((r) => ({ rec: r, name: r.name || "", voices: r.voices || null }));
  splitTeams();
  goTeamReveal();
};

/* ============================================================
   2. チーム発表
   ============================================================ */
function splitTeams() {
  const sh = Util.shuffle(roster);
  const half = Math.ceil(sh.length / 2);   // 奇数なら あかが 1人 おおい
  teams.red = sh.slice(0, half);
  teams.blue = sh.slice(half);
}
function goTeamReveal() {
  show("teamScreen");
  revealTeams();
}
async function revealTeams() {
  const gen = ++teamGen;
  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));
  $("redMembers").innerHTML = "";
  $("blueMembers").innerHTML = "";
  $("startBtn").disabled = true;
  $("redoBtn").disabled = true;

  // あか・あおを こうごに 1人ずつ 発表していく
  const order = [];
  const maxLen = Math.max(teams.red.length, teams.blue.length);
  for (let i = 0; i < maxLen; i++) {
    if (teams.red[i])  order.push(["red", teams.red[i]]);
    if (teams.blue[i]) order.push(["blue", teams.blue[i]]);
  }

  await sleep(350);
  for (const [team, mem] of order) {
    if (gen !== teamGen) return;                 // やりなおし等で 中断
    drumroll();
    await sleep(360);
    if (gen !== teamGen) return;
    const box = $(team === "red" ? "redMembers" : "blueMembers");
    const d = document.createElement("div");
    d.className = "db-mem";
    d.innerHTML = `<img src="${mem.rec.dataURL}" alt=""><div class="nm">${mem.name}</div>`;
    box.appendChild(d);
    Sound.pon();
    await sleep(180);
  }
  if (gen !== teamGen) return;
  $("startBtn").disabled = false;
  $("redoBtn").disabled = false;
  Ui.msg("よういは いい?", 1200, "#2f9e44");
}
function drumroll() {
  // ドラムロールっぽい みじかい 連打音
  for (let i = 0; i < 5; i++) Sound.beep(180 + i * 6, 0.04, "square", 0.06, i * 0.05);
}
$("redoBtn").onclick = () => {
  Sound.tap();
  splitTeams();
  revealTeams();
};
$("startBtn").onclick = () => {
  if ($("startBtn").disabled) return;
  teamGen++;                     // 発表シーケンスを止める
  Sound.pon();
  startMatch();
};

/* ============================================================
   3. 試合(全自動)
   ============================================================ */
const WIND = 0.55, FLY = 0.5, RESOLVE = 1.15, INTRO = 1.2;

function makePlayer(base, team) {
  const el = document.createElement("div");
  el.className = "db-player " + team;
  el.innerHTML =
    `<div class="db-pl-inner"><img src="${base.rec.dataURL}" alt="">` +
    `<div class="db-plname">${base.name}</div></div>`;
  return {
    name: base.name, voices: base.voices, team, el,
    alive: true, x: 50, y: 50, tx: 50, ty: 50,
    homeX: 50, homeY: 50, wander: 0,
  };
}

function startMatch() {
  stopLoop();
  const court = $("court");
  // まえの試合の キャラ・ボールを かたづける
  court.querySelectorAll(".db-player,.db-ball,.db-banner").forEach((n) => n.remove());

  const players = [];
  for (const b of teams.red)  players.push(makePlayer(b, "red"));
  for (const b of teams.blue) players.push(makePlayer(b, "blue"));
  for (const p of players) court.appendChild(p.el);

  const ball = document.createElement("div");
  ball.className = "db-ball";
  ball.textContent = "🏐";
  court.appendChild(ball);

  M = {
    players, ball, court,
    ballTeam: Math.random() < 0.5 ? "red" : "blue",
    phase: "intro", phaseT: 0,
    thrower: null, target: null, outcome: null, launched: false,
    ballX: 50, ballY: 50, ballFromX: 50, ballFromY: 50, ballToX: 50, ballToY: 50,
    throwGap: 1.0, over: false,
  };

  layoutTeam("red", true);
  layoutTeam("blue", true);
  for (const p of players) { p.x = p.tx; p.y = p.ty; }
  M.ballX = 50; M.ballY = M.ballTeam === "red" ? RED_MAX : BLUE_MIN;

  show("playScreen");
  updateHud();
  Ui.msg("しあい かいし!", 1200, "#ff922b");
  Sound.fanfare();

  let last = performance.now();
  (function loop(now) {
    if (!M || M.over) return;
    const dt = Math.min(0.04, (now - last) / 1000); last = now;
    updateMatch(dt);
    renderMatch();
    rafId = requestAnimationFrame(loop);
  })(last);
}
function stopLoop() { if (rafId) cancelAnimationFrame(rafId); rafId = 0; }

function alivePlayers(team) { return M.players.filter((p) => p.alive && p.team === team); }
function aliveCount(team) { return alivePlayers(team).length; }

/* チームの キャラを コート内に ならべ直す(脱落者は ベンチへ) */
function layoutTeam(team, snap) {
  const alive = alivePlayers(team);
  const yMin = team === "red" ? RED_MIN : BLUE_MIN;
  const yMax = team === "red" ? RED_MAX : BLUE_MAX;
  const N = alive.length;
  const cols = Math.min(N, 5) || 1;
  const rows = Math.ceil(N / cols);
  alive.forEach((p, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = cols === 1 ? (XMIN + XMAX) / 2 : XMIN + (XMAX - XMIN) * col / (cols - 1);
    const y = rows === 1 ? (yMin + yMax) / 2 : yMin + (yMax - yMin) * row / (rows - 1);
    p.homeX = x; p.homeY = y;
    p.tx = x; p.ty = y;
    if (snap) { p.x = x; p.y = y; }
  });
  // 脱落者は ベンチに よこ1れつ
  const dead = M.players.filter((p) => !p.alive && p.team === team);
  const benchY = team === "red" ? RED_BENCH : BLUE_BENCH;
  dead.forEach((p, i) => {
    const span = Math.max(1, dead.length - 1);
    const x = dead.length === 1 ? 50 : XMIN + (XMAX - XMIN) * i / span;
    p.tx = x; p.ty = benchY;
  });
}

function updateHud() {
  $("hudRed").textContent  = `🔴あか ${aliveCount("red")}にん`;
  $("hudBlue").textContent = `🔵あお ${aliveCount("blue")}にん`;
}

function startThrow() {
  const attackers = alivePlayers(M.ballTeam);
  const defTeam = M.ballTeam === "red" ? "blue" : "red";
  const defenders = alivePlayers(defTeam);
  if (!attackers.length || !defenders.length) { endMatch(); return; }

  const thrower = Util.choice(attackers);
  const target = Util.choice(defenders);

  // けっか(あたる/キャッチ/よける)を さきに きめておく
  let hit = 0.5, katch = 0.18, dodge = 0.32;
  if (defenders.length === 1) {           // さいごの1人は ねばる(大逆転あり)
    hit = 0.30; katch = 0.32; dodge = 0.38;
  }
  const roll = Math.random();
  const outcome = roll < hit ? "hit" : roll < hit + dodge ? "dodge" : "catch";

  M.thrower = thrower; M.target = target; M.outcome = outcome; M.launched = false;
  M.phase = "wind"; M.phaseT = 0;

  // なげる人は センターライン ちかくへ、ねらう相手の 方向に すこし よる
  thrower.tx = Util.clamp((thrower.homeX + target.homeX) / 2, XMIN, XMAX);
  thrower.ty = thrower.team === "red" ? RED_MAX + 2 : BLUE_MIN - 2;
  M.players.forEach((cls) => cls.el.classList.remove("holder"));
  thrower.el.classList.add("holder");
}

function launchBall() {
  const t = M.thrower, g = M.target;
  M.ballFromX = t.x; M.ballFromY = t.y;
  M.ballToX = g.x;  M.ballToY = g.y;
  M.launched = true;
  M.phase = "fly"; M.phaseT = 0;
  M.thrower.el.classList.remove("holder");
  Sound.beep(520, 0.16, "square", 0.10, 0, 220);   // シュッ
}

function resolve() {
  const t = M.thrower, g = M.target, oc = M.outcome;
  const defTeam = g.team;
  const banner = $("court").querySelector(".db-banner");

  if (oc === "hit") {
    eliminate(g);
    showBanner(`🏐 ${t.name} が ${g.name} に あてた!\n${g.name} せんじょう!`, defTeam);
    Sound.bad();
    Sound.playVoice(g.voices, ["fail", "ouch"]);
  } else if (oc === "catch") {
    eliminate(t);
    showBanner(`🎉 ${g.name} ナイスキャッチ!\n${t.name} せんじょう!`, defTeam);
    Sound.pon(); Sound.good();
    Sound.playVoice(g.voices, ["joy"]);
  } else { // dodge
    g.tx = Util.clamp(g.homeX + (Math.random() < 0.5 ? -16 : 16), XMIN, XMAX);
    showBanner(`${g.name} ひらり!よけた!`, defTeam);
    Sound.beep(760, 0.18, "square", 0.10, 0, 320);
  }

  // つぎに なげるのは まもっていた チーム(あか⇔あお こうごで わかりやすく)
  M.ballTeam = defTeam;
  M.ballToX = g.x; M.ballToY = g.y;   // ボールは まもった側の いちへ
  updateHud();
  M.phase = "resolve"; M.phaseT = 0;
}

function eliminate(p) {
  p.alive = false;
  p.el.classList.add("dead");
  p.el.classList.remove("holder");
  layoutTeam(p.team);
}

function hideBanner() {
  const b = $("court").querySelector(".db-banner");
  if (b) b.remove();
}
function showBanner(text, team) {
  hideBanner();
  const b = document.createElement("div");
  b.className = "db-banner " + team;
  b.textContent = text;
  $("court").appendChild(b);
}

function updateMatch(dt) {
  M.phaseT += dt;

  if (M.phase === "intro") {
    if (M.phaseT >= INTRO) startThrow();
  } else if (M.phase === "wind") {
    if (M.phaseT >= WIND) launchBall();
  } else if (M.phase === "fly") {
    if (M.phaseT >= FLY) resolve();
  } else if (M.phase === "resolve") {
    if (M.phaseT >= RESOLVE) {
      hideBanner();
      if (aliveCount("red") === 0 || aliveCount("blue") === 0) { endMatch(); return; }
      // 人数が へったら テンポUP
      const total = aliveCount("red") + aliveCount("blue");
      M.throwGap = Util.clamp(0.3 + total * 0.06, 0.35, 1.05);
      M.phase = "gap"; M.phaseT = 0;
    }
  } else if (M.phase === "gap") {
    if (M.phaseT >= M.throwGap) startThrow();
  }

  // ボールの いち
  if (M.phase === "fly") {
    const s = Util.clamp(M.phaseT / FLY, 0, 1);
    M.ballX = M.ballFromX + (M.ballToX - M.ballFromX) * s;
    const lift = Math.sin(Math.PI * s) * 12;     // 山なりに とぶ
    M.ballY = M.ballFromY + (M.ballToY - M.ballFromY) * s - lift;
  } else if (M.phase === "wind" && M.thrower) {
    M.ballX += (M.thrower.x - M.ballX) * Math.min(1, dt * 10);
    M.ballY += ((M.thrower.y - 3) - M.ballY) * Math.min(1, dt * 10);
  } else {
    M.ballX += (M.ballToX - M.ballX) * Math.min(1, dt * 6);
    M.ballY += (M.ballToY - M.ballY) * Math.min(1, dt * 6);
  }

  // キャラの うごき(ホーム付近を うろうろ)
  for (const p of M.players) {
    if (p.alive && p !== M.thrower) {
      p.wander -= dt;
      if (p.wander <= 0) {
        p.wander = Util.rand(0.5, 1.3);
        p.tx = Util.clamp(p.homeX + Util.rand(-4, 4), XMIN, XMAX);
        const yMin = p.team === "red" ? RED_MIN : BLUE_MIN;
        const yMax = p.team === "red" ? RED_MAX : BLUE_MAX;
        p.ty = Util.clamp(p.homeY + Util.rand(-3, 3), yMin, yMax);
      }
    }
    const k = Math.min(1, dt * 6);
    p.x += (p.tx - p.x) * k;
    p.y += (p.ty - p.y) * k;
  }
}

function renderMatch() {
  for (const p of M.players) {
    p.el.style.left = p.x + "%";
    p.el.style.top = p.y + "%";
  }
  M.ball.style.left = M.ballX + "%";
  M.ball.style.top = M.ballY + "%";
}

/* ============================================================
   4. 勝利演出
   ============================================================ */
function endMatch() {
  if (M.over) return;
  M.over = true;
  stopLoop();
  hideBanner();
  const winTeam = aliveCount("red") > 0 ? "red" : "blue";
  const label = winTeam === "red" ? "🔴 あかチーム" : "🔵 あおチーム";

  const title = $("winTitle");
  title.textContent = `${label}の かち!`;
  title.className = winTeam;

  // 勝った チーム 全員を ジャンプで登場
  const box = $("winners");
  box.innerHTML = "";
  const winners = teams[winTeam];
  for (const w of winners) {
    const d = document.createElement("div");
    d.className = "db-winner";
    d.innerHTML = `<img src="${w.rec.dataURL}" alt=""><div class="nm">${w.name}</div>`;
    box.appendChild(d);
  }

  show("winScreen");
  Sound.fanfare();
  Ui.confetti();
  Ui.msg(`${label}の かち!`, 2200, winTeam === "red" ? "#d6336c" : "#1c7ed6");
  // 勝者の よろこびの こえ(1人だけ・重ならないように)
  const withVoice = winners.filter((w) => w.voices);
  if (withVoice.length) Sound.playVoice(Util.choice(withVoice).voices, ["joy"]);
}

$("rematchBtn").onclick = () => {          // おなじメンバー・おなじチームで さいせん
  Sound.pon();
  startMatch();
};
$("reselectBtn").onclick = () => {         // キャラえらびへ もどる
  Sound.tap();
  stopLoop(); if (M) M.over = true;
  show("selectScreen");
  renderGallery();
};
$("topBtn").onclick = () => { Sound.tap(); location.href = "../index.html"; };

/* ---- 起動 ---- */
show("selectScreen");
initSelect();
</script>
</body>
