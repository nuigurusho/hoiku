<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ドッヂボール</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  /* ===== ドッヂボール専用スタイル(1ファイル完結) ===== */

  /* --- チーム発表 --- */
  .db-teams {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 10px;
    max-width: 980px;
    margin: 10px auto;
    flex-wrap: nowrap;
  }
  .db-teamcol {
    flex: 1 1 0;
    min-width: 0;
    background: #fff;
    border-radius: 22px;
    border: 5px solid var(--cream-d);
    box-shadow: 0 6px 0 var(--cream-d);
    padding: 10px 8px 14px;
  }
  .db-teamcol.red  { border-color: var(--pink); box-shadow: 0 6px 0 var(--pink-d); background: #fff0f6; }
  .db-teamcol.blue { border-color: var(--blue); box-shadow: 0 6px 0 var(--blue-d); background: #e7f5ff; }
  .db-teamcol h3 { margin: 4px 0 8px; font-size: clamp(20px, 4.5vw, 30px); }
  .db-teamcol.red  h3 { color: var(--pink-d); }
  .db-teamcol.blue h3 { color: var(--blue-d); }
  .db-members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
    gap: 8px;
    min-height: 90px;
    align-content: start;
  }
  .db-mem { text-align: center; animation: db-pop .4s cubic-bezier(.2,1.6,.4,1) both; }
  .db-mem img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: contain;
    background: #fff;
    border-radius: 12px;
    border: 3px solid #eee2d0;
  }
  .db-mem .nm { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .db-vs { align-self: center; font-size: clamp(24px, 6vw, 46px); font-weight: bold; color: #a99; flex: 0 0 auto; }
  @keyframes db-pop { from { transform: scale(.2) rotate(-12deg); opacity: 0; } }

  /* --- 試合HUD(残り人数) --- */
  .db-hud {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: bold;
    font-size: clamp(20px, 5vw, 34px);
    margin: 6px 0 8px;
    flex-wrap: wrap;
  }
  .db-hud span { background: #fff; border-radius: 999px; padding: 4px 18px; box-shadow: 0 3px 0 rgba(150,110,70,.16); white-space: nowrap; }
  .db-hud .db-red  { color: var(--pink-d); }
  .db-hud .db-blue { color: var(--blue-d); }
  .db-hud .db-vslabel { background: none; box-shadow: none; color: #8a7a68; padding: 0 2px; }

  /* --- ステージ(コートの canvas + オーバーレイ) --- */
  .db-stage { position: relative; max-width: 1000px; margin: 0 auto; }

  /* --- じっきょうテロップ(下部の黒おび・プレイを じゃましない) --- */
  .db-banner {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 40;
    text-align: center;
    font-weight: bold;
    font-size: clamp(15px, 3.2vw, 28px);
    line-height: 1.2;
    color: #fff;
    background: linear-gradient(to top, rgba(18,12,6,.86), rgba(18,12,6,.62));
    padding: 9px 16px 11px;
    border-top: 5px solid var(--yellow);
    pointer-events: none;
    animation: db-banner-in .22s ease-out both;
  }
  .db-banner.red  { border-top-color: var(--pink); }
  .db-banner.blue { border-top-color: var(--blue); }
  @keyframes db-banner-in { from { transform: translateY(100%); opacity: 0; } }

  /* --- 勝利オーバーレイ(canvasの上に タイトル+ボタン) --- */
  .db-winbar {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    pointer-events: none;
  }
  .db-winbar h2 {
    margin: 0;
    font-size: clamp(26px, 6.5vw, 52px);
    text-align: center;
    background: rgba(255,255,255,.9);
    border-radius: 999px;
    padding: 6px 26px;
    box-shadow: 0 5px 0 rgba(150,110,70,.18);
    pointer-events: auto;
  }
  .db-winbar h2.red  { color: var(--pink-d); }
  .db-winbar h2.blue { color: var(--blue-d); }
  .db-winbar .db-winbtns { pointer-events: auto; width: 100%; }
  .db-winbar .row { margin: 6px 0; }

  @media (max-width: 560px) {
    /* スマホ縦:ゲーム中は ヘッダーが「← もどる」フローティングになるので
       人数HUDが かぶらないよう 上に すきまを あける */
    .db-hud { margin-top: 50px; font-size: clamp(18px, 4.6vw, 26px); }
    .db-winbar .btn.big { font-size: 20px; padding: 14px 20px; }
  }
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1>🏐 ドッヂボール</h1>
  <div class="spacer"></div>
</header>

<main>
  <!-- 1. キャラ選択 -->
  <div id="selectScreen">
    <div class="panel">
      <h2>たたかう キャラを えらんでね<br><span style="font-size:18px;font-weight:normal;color:#8a7a68">(タッチで えらぶ / はずす)</span></h2>
      <div class="gallery" id="gallery"></div>
      <p class="note" id="selNote" style="font-size:17px;font-weight:bold;min-height:22px"></p>
      <div class="row"><button class="btn big pink" id="decideBtn">けってい!</button></div>
      <p class="note">えらんだ みんなが 2チームに わかれて、じどうで たいせんするよ。みているだけでOK!</p>
    </div>
  </div>

  <!-- 2. チーム発表 -->
  <div id="teamScreen" class="hidden">
    <h2 style="text-align:center;margin:10px 0 4px;font-size:clamp(22px,5vw,32px)">🎪 チームわけ!</h2>
    <div class="db-teams">
      <div class="db-teamcol red"><h3>🔴 あかチーム</h3><div class="db-members" id="redMembers"></div></div>
      <div class="db-vs">VS</div>
      <div class="db-teamcol blue"><h3>🔵 あおチーム</h3><div class="db-members" id="blueMembers"></div></div>
    </div>
    <div class="row" id="teamBtns">
      <button class="btn big yellow" id="redoBtn">やりなおす</button>
      <button class="btn big green"  id="startBtn">スタート!</button>
    </div>
  </div>

  <!-- 3. 試合(全自動)+ 4. 勝利演出 -->
  <div id="playScreen" class="hidden">
    <div class="db-hud">
      <span class="db-red"  id="hudRed">🔴あか 0にん</span>
      <span class="db-vslabel">vs</span>
      <span class="db-blue" id="hudBlue">🔵あお 0にん</span>
    </div>
    <div class="db-stage">
      <canvas id="cv" class="stage" width="1280" height="720"></canvas>
      <div class="db-banner hidden" id="banner"></div>
      <div class="db-winbar hidden" id="winOverlay">
        <h2 id="winTitle">かち!</h2>
        <div class="db-winbtns">
          <div class="row"><button class="btn big pink" id="rematchBtn">もういっかい しょうぶ!</button></div>
          <div class="row">
            <button class="btn blue" id="reselectBtn">メンバーを えらびなおす</button>
            <button class="btn gray" id="topBtn">トップに もどる</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/rig.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");
const CW = 1280, CH = 720;

/* ---- 画面きりかえ ---- */
const SCREENS = ["selectScreen", "teamScreen", "playScreen"];
function show(id) { for (const s of SCREENS) $(s).classList.toggle("hidden", s !== id); }

/* ---- コート座標(px・足もと基準) ---- */
const XMIN = 175, XMAX = 1105;
const LINE = 360;                       // センターライン
const RED_INNER = [236, 348];           // あか内野の 足もとY(上→下)
const BLUE_INNER = [474, 610];          // あお内野の 足もとY
const RED_BENCH = 116, BLUE_BENCH = 702; // ベンチ(脱落者)の 足もとY

/* ---- 状態 ---- */
let allChars = [];
const selectedIds = new Set();
let roster = [];               // [{rec,name,voices}]
let teams = { red: [], blue: [] };
let teamGen = 0;
let M = null;
let rafId = 0;

/* ============================================================
   1. キャラ選択
   ============================================================ */
async function initSelect() {
  const recs = await Store.ensureSamples();
  allChars = recs.filter((r) => r.cat === "char");
  allChars.forEach((r) => selectedIds.add(r.id));   // さいしょは ぜんいん
  renderGallery();
}
function renderGallery() {
  const el = $("gallery");
  el.innerHTML = "";
  for (const r of allChars) {
    const d = document.createElement("div");
    d.className = "thumb" + (selectedIds.has(r.id) ? " selected" : "");
    d.innerHTML = `<img src="${r.dataURL}" alt=""><div class="name">${r.name || ""}</div>`;
    d.onclick = () => {
      Sound.tap();
      selectedIds.has(r.id) ? selectedIds.delete(r.id) : selectedIds.add(r.id);
      renderGallery();
    };
    el.appendChild(d);
  }
  refreshDecide();
}
function refreshDecide() {
  const n = selectedIds.size;
  const btn = $("decideBtn"), note = $("selNote");
  if (n < 4) {
    btn.disabled = true;
    note.textContent = `あと ${4 - n}にん えらんでね(4にん いじょうで はじめられるよ)`;
    note.style.color = "#d6336c";
  } else {
    btn.disabled = false;
    note.textContent = `${n}にんで たいせん!`;
    note.style.color = "#2f9e44";
  }
}
$("decideBtn").onclick = () => {
  if (selectedIds.size < 4) { Sound.bad(); return; }
  Sound.pon();
  roster = allChars
    .filter((r) => selectedIds.has(r.id))
    .map((r) => ({ rec: r, name: r.name || "", voices: r.voices || null }));
  splitTeams();
  goTeamReveal();
};

/* ============================================================
   2. チーム発表
   ============================================================ */
function splitTeams() {
  const sh = Util.shuffle(roster);
  const half = Math.ceil(sh.length / 2);   // 奇数なら あかが 1人 おおい
  teams.red = sh.slice(0, half);
  teams.blue = sh.slice(half);
}
function goTeamReveal() { show("teamScreen"); revealTeams(); }
async function revealTeams() {
  const gen = ++teamGen;
  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));
  $("redMembers").innerHTML = "";
  $("blueMembers").innerHTML = "";
  $("startBtn").disabled = true;
  $("redoBtn").disabled = true;

  const order = [];
  const maxLen = Math.max(teams.red.length, teams.blue.length);
  for (let i = 0; i < maxLen; i++) {
    if (teams.red[i])  order.push(["red", teams.red[i]]);
    if (teams.blue[i]) order.push(["blue", teams.blue[i]]);
  }

  await sleep(350);
  for (const [team, mem] of order) {
    if (gen !== teamGen) return;
    drumroll();
    await sleep(360);
    if (gen !== teamGen) return;
    const box = $(team === "red" ? "redMembers" : "blueMembers");
    const d = document.createElement("div");
    d.className = "db-mem";
    d.innerHTML = `<img src="${mem.rec.dataURL}" alt=""><div class="nm">${mem.name}</div>`;
    box.appendChild(d);
    Sound.pon();
    await sleep(180);
  }
  if (gen !== teamGen) return;
  $("startBtn").disabled = false;
  $("redoBtn").disabled = false;
  Ui.msg("よういは いい?", 1200, "#2f9e44");
}
function drumroll() {
  for (let i = 0; i < 5; i++) Sound.beep(180 + i * 6, 0.04, "square", 0.06, i * 0.05);
}
$("redoBtn").onclick = () => { Sound.tap(); splitTeams(); revealTeams(); };
$("startBtn").onclick = () => {
  if ($("startBtn").disabled) return;
  teamGen++;
  Sound.pon();
  startMatch();
};

/* ============================================================
   3. 試合(全自動・Canvas + Puppet)
   ============================================================ */
const WIND = 0.55, FLY = 0.5, RESOLVE = 1.15, INTRO = 1.2;

async function startMatch() {
  stopLoop();
  show("playScreen");
  $("banner").classList.add("hidden");
  $("winOverlay").classList.add("hidden");

  // 人数に あわせて キャラの おおきさを きめる
  const perMax = Math.max(teams.red.length, teams.blue.length);
  const hBase = Util.clamp(152 - perMax * 7, 76, 150);

  // すべての キャラを パペット化(白背景を切りぬき+手足分割)
  const players = [];
  for (const [team, list] of [["red", teams.red], ["blue", teams.blue]]) {
    for (const b of list) {
      const parts = await Rig.load(b.rec);
      players.push({
        name: b.name, voices: b.voices, team,
        puppet: new Puppet(parts, { h: hBase, facing: 1 }),
        alive: true, hBase, tx: 640, ty: 360, homeX: 640, homeY: 360, wander: 0, hopCd: 0,
      });
    }
  }

  M = {
    players, hBase,
    ballTeam: Math.random() < 0.5 ? "red" : "blue",
    phase: "intro", phaseT: 0,
    thrower: null, target: null, outcome: null,
    ballX: 640, ballY: 360, ballFromX: 640, ballFromY: 360, ballToX: 640, ballToY: 360,
    throwGap: 1.0, over: false, winTeam: null, stop: false,
  };

  layoutTeam("red", true);
  layoutTeam("blue", true);
  for (const p of players) { p.puppet.x = p.tx; p.puppet.y = p.ty; }
  M.ballY = M.ballTeam === "red" ? RED_INNER[1] : BLUE_INNER[0];

  updateHud();
  Ui.msg("しあい かいし!", 1200, "#ff922b");
  Sound.fanfare();

  let last = performance.now();
  (function loop(now) {
    if (!M || M.stop) return;
    const dt = Math.min(0.04, (now - last) / 1000); last = now;
    updateMatch(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  })(last);
}
function stopLoop() { if (rafId) cancelAnimationFrame(rafId); rafId = 0; if (M) M.stop = true; }

function alivePlayers(team) { return M.players.filter((p) => p.alive && p.team === team); }
function aliveCount(team) { return alivePlayers(team).length; }

/* チームの キャラを コート内に ならべ直す(脱落者は ベンチへ) */
function layoutTeam(team, snap) {
  const alive = alivePlayers(team);
  const band = team === "red" ? RED_INNER : BLUE_INNER;
  const N = alive.length;
  const cols = Math.min(N, 5) || 1;
  const rows = Math.ceil(N / cols);
  alive.forEach((p, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = cols === 1 ? (XMIN + XMAX) / 2 : XMIN + (XMAX - XMIN) * col / (cols - 1);
    const y = rows === 1 ? (band[0] + band[1]) / 2 : band[0] + (band[1] - band[0]) * row / (rows - 1);
    p.homeX = x; p.homeY = y; p.tx = x; p.ty = y;
    if (snap) { p.puppet.x = x; p.puppet.y = y; }
  });
  const dead = M.players.filter((p) => !p.alive && p.team === team);
  const benchY = team === "red" ? RED_BENCH : BLUE_BENCH;
  dead.forEach((p, i) => {
    const span = Math.max(1, dead.length - 1);
    const x = dead.length === 1 ? 640 : XMIN + (XMAX - XMIN) * i / span;
    p.tx = x; p.ty = benchY;
  });
}

function updateHud() {
  $("hudRed").textContent  = `🔴あか ${aliveCount("red")}にん`;
  $("hudBlue").textContent = `🔵あお ${aliveCount("blue")}にん`;
}

function startThrow() {
  const attackers = alivePlayers(M.ballTeam);
  const defTeam = M.ballTeam === "red" ? "blue" : "red";
  const defenders = alivePlayers(defTeam);
  if (!attackers.length || !defenders.length) { endMatch(); return; }

  const thrower = Util.choice(attackers);
  const target = Util.choice(defenders);

  // けっか(あたる/よける/キャッチ)を さきに きめる
  let hit = 0.5, dodge = 0.32;             // のこりは catch
  if (defenders.length === 1) { hit = 0.30; dodge = 0.38; }  // さいごの1人は ねばる
  const roll = Math.random();
  const outcome = roll < hit ? "hit" : roll < hit + dodge ? "dodge" : "catch";

  M.thrower = thrower; M.target = target; M.outcome = outcome;
  M.phase = "wind"; M.phaseT = 0;

  // なげる人は センターライン ちかくへ、相手の方を むく
  thrower.tx = Util.clamp((thrower.homeX + target.homeX) / 2, XMIN, XMAX);
  thrower.ty = thrower.team === "red" ? LINE - 14 : LINE + 14;
}

function launchBall() {
  const t = M.thrower, g = M.target;
  M.ballFromX = t.puppet.x; M.ballFromY = t.puppet.y - t.puppet.h * 0.6;
  M.ballToX = g.puppet.x;   M.ballToY = g.puppet.y - g.puppet.h * 0.5;
  M.phase = "fly"; M.phaseT = 0;
  Sound.beep(520, 0.16, "square", 0.10, 0, 220);   // シュッ
}

function resolve() {
  const t = M.thrower, g = M.target, oc = M.outcome;
  const defTeam = g.team;

  if (oc === "hit") {
    eliminate(g);
    showBanner(`🏐 ${t.name} が あてた! ${g.name} アウト!`, defTeam);
    Sound.bad();
    Sound.playVoice(g.voices, ["fail", "ouch"]);
  } else if (oc === "catch") {
    eliminate(t);
    g.puppet.hop();
    showBanner(`🎉 ${g.name} ナイスキャッチ! ${t.name} アウト!`, defTeam);
    Sound.pon(); Sound.good();
    Sound.playVoice(g.voices, ["joy"]);
  } else { // dodge
    g.tx = Util.clamp(g.homeX + (Math.random() < 0.5 ? -110 : 110), XMIN, XMAX);
    g.puppet.hop();
    showBanner(`💨 ${g.name} ひらり! よけた!`, defTeam);
    Sound.beep(760, 0.18, "square", 0.10, 0, 320);
  }

  // つぎに なげるのは まもっていた チーム(あか⇔あお こうご)
  M.ballTeam = defTeam;
  M.ballToX = g.puppet.x; M.ballToY = g.puppet.y - g.puppet.h * 0.5;
  updateHud();
  M.phase = "resolve"; M.phaseT = 0;
}

function eliminate(p) {
  p.alive = false;
  p.puppet.h = p.hBase * 0.62;   // ベンチでは 小さく
  layoutTeam(p.team);
}

function showBanner(text, team) {
  const b = $("banner");
  b.textContent = text;
  b.className = "db-banner " + team;
  b.classList.remove("hidden");
  // アニメを 再生し直す
  b.style.animation = "none"; void b.offsetWidth; b.style.animation = "";
}
function hideBanner() { $("banner").classList.add("hidden"); }

function updateMatch(dt) {
  M.phaseT += dt;

  if (!M.over) {
    if (M.phase === "intro") {
      if (M.phaseT >= INTRO) startThrow();
    } else if (M.phase === "wind") {
      if (M.phaseT >= WIND) launchBall();
    } else if (M.phase === "fly") {
      if (M.phaseT >= FLY) resolve();
    } else if (M.phase === "resolve") {
      if (M.phaseT >= RESOLVE) {
        hideBanner();
        if (aliveCount("red") === 0 || aliveCount("blue") === 0) { endMatch(); return; }
        const total = aliveCount("red") + aliveCount("blue");
        M.throwGap = Util.clamp(0.3 + total * 0.06, 0.35, 1.05);   // 人数が へると テンポUP
        M.phase = "gap"; M.phaseT = 0;
      }
    } else if (M.phase === "gap") {
      if (M.phaseT >= M.throwGap) startThrow();
    }

    // ボールの いち
    if (M.phase === "fly") {
      const s = Util.clamp(M.phaseT / FLY, 0, 1);
      M.ballX = M.ballFromX + (M.ballToX - M.ballFromX) * s;
      M.ballY = M.ballFromY + (M.ballToY - M.ballFromY) * s - Math.sin(Math.PI * s) * 90;
    } else if (M.phase === "wind" && M.thrower) {
      const t = M.thrower;
      M.ballX += (t.puppet.x - M.ballX) * Math.min(1, dt * 10);
      M.ballY += ((t.puppet.y - t.puppet.h * 0.6) - M.ballY) * Math.min(1, dt * 10);
    } else {
      M.ballX += (M.ballToX - M.ballX) * Math.min(1, dt * 6);
      M.ballY += (M.ballToY - M.ballY) * Math.min(1, dt * 6);
    }
  }

  // 勝利演出:勝った チームだけ その場で とびはねる
  if (M.over) {
    for (const p of M.winners) {
      p.hopCd -= dt;
      if (p.hopCd <= 0 && p.puppet.jumpT <= 0) { p.puppet.hop(); p.hopCd = Util.rand(0.4, 1.0); }
      p.puppet.walking = false;
      p.puppet.update(dt);
    }
    return;
  }

  // キャラの うごき
  for (const p of M.players) {
    const pu = p.puppet;
    if (p.alive && p !== M.thrower && (M.phase === "gap" || M.phase === "intro")) {
      // ホーム付近を うろうろ
      p.wander -= dt;
      if (p.wander <= 0) {
        p.wander = Util.rand(0.5, 1.3);
        const band = p.team === "red" ? RED_INNER : BLUE_INNER;
        p.tx = Util.clamp(p.homeX + Util.rand(-45, 45), XMIN, XMAX);
        p.ty = Util.clamp(p.homeY + Util.rand(-20, 20), band[0] - 4, band[1] + 4);
      }
    }
    // ターゲットへ 移動
    const dx = p.tx - pu.x, dy = p.ty - pu.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 3) {
      const sp = !p.alive ? 260 : (p === M.thrower ? 240 : 130);
      const step = Math.min(dist, sp * dt);
      pu.x += dx / dist * step;
      pu.y += dy / dist * step;
      pu.walking = true;
      if (Math.abs(dx) > 2) pu.facing = Math.sign(dx);
    } else {
      pu.walking = false;
    }
    pu.update(dt);
  }
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  if (M.over) { drawVictory(); return; }
  // 床
  ctx.fillStyle = "#fbf7ee"; ctx.fillRect(0, 0, CW, CH);
  ctx.fillStyle = "rgba(255,107,157,.12)"; ctx.fillRect(0, 0, CW, LINE);
  ctx.fillStyle = "rgba(77,171,247,.12)";  ctx.fillRect(0, LINE, CW, CH - LINE);
  // ベンチ帯
  ctx.fillStyle = "rgba(150,130,110,.10)";
  ctx.fillRect(0, 0, CW, 152); ctx.fillRect(0, CH - 152, CW, 152);
  // センターライン
  ctx.save();
  ctx.setLineDash([26, 20]); ctx.lineWidth = 5; ctx.strokeStyle = "rgba(120,90,60,.35)";
  ctx.beginPath(); ctx.moveTo(40, LINE); ctx.lineTo(CW - 40, LINE); ctx.stroke();
  ctx.restore();

  // キャラ(奥=足もとYが小さい ものから)
  const order = M.players.slice().sort((a, b) => a.puppet.y - b.puppet.y);
  for (const p of order) drawPlayer(p);

  // ボール(試合中のみ・最前面)
  if (!M.over) drawBall();
  ctx.textAlign = "left";
}

/* はっきり見える ドッヂボール(絵文字だと環境で 出ないので canvas で描く) */
function drawBall() {
  const x = M.ballX, y = M.ballY;
  const flying = M.phase === "fly";
  const r = (flying ? 30 : 25) * (0.42 + 0.58 * Math.min(1, M.hBase / 120));
  const spin = M.ballX * 0.03;   // ころがり回転

  ctx.save();
  // 影(ふわっと)
  ctx.fillStyle = "rgba(60,40,20,.18)";
  ctx.beginPath(); ctx.ellipse(x, y + r * 0.95, r * 0.95, r * 0.34, 0, 0, 7); ctx.fill();
  // 本体(立体感のある オレンジの ボール)
  const g = ctx.createRadialGradient(x - r * 0.35, y - r * 0.4, r * 0.15, x, y, r);
  g.addColorStop(0, "#ffe0b8"); g.addColorStop(0.45, "#ff922b"); g.addColorStop(1, "#e8590c");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  ctx.lineWidth = Math.max(3, r * 0.16); ctx.strokeStyle = "#fff"; ctx.stroke();
  // ボールの すじ(白ライン・回転する)
  ctx.save();
  ctx.translate(x, y); ctx.rotate(spin);
  ctx.lineWidth = Math.max(2, r * 0.1); ctx.strokeStyle = "rgba(255,255,255,.9)";
  ctx.beginPath(); ctx.arc(0, -r * 0.15, r * 0.85, 0.55, Math.PI - 0.55); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,  r * 0.15, r * 0.85, Math.PI + 0.55, -0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.stroke();
  ctx.restore();
  // ハイライト
  ctx.fillStyle = "rgba(255,255,255,.75)";
  ctx.beginPath(); ctx.arc(x - r * 0.34, y - r * 0.4, r * 0.2, 0, 7); ctx.fill();
  ctx.restore();
}

/* 勝利画面:勝った チームだけを ならべて 大きく えがく(コート・脱落者は 出さない) */
function drawVictory() {
  const g = ctx.createLinearGradient(0, 0, 0, CH);
  g.addColorStop(0, M.winTeam === "red" ? "#ffe3ee" : "#e3f0ff");
  g.addColorStop(1, "#fffdf5");
  ctx.fillStyle = g; ctx.fillRect(0, 0, CW, CH);

  const order = M.winners.slice().sort((a, b) => a.puppet.y - b.puppet.y);
  for (const p of order) {
    p.puppet.draw(ctx);
    ctx.font = "bold 26px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = M.winTeam === "red" ? "#d6336c" : "#1c7ed6";
    ctx.fillText(p.name, p.puppet.x, p.puppet.y + 28);
  }
  ctx.textAlign = "left";
}

function drawPlayer(p) {
  const pu = p.puppet;
  ctx.save();
  if (!p.alive) ctx.globalAlpha = 0.4;
  // ボールを もっている人は 光る
  if (!M.over && M.thrower === p && M.phase === "wind") {
    ctx.save();
    ctx.fillStyle = "rgba(255,212,59,.45)";
    ctx.beginPath(); ctx.arc(pu.x, pu.y - pu.h * 0.5, pu.h * 0.62, 0, 7); ctx.fill();
    ctx.restore();
  }
  pu.draw(ctx);
  // なまえ
  ctx.font = "bold 20px sans-serif";
  ctx.textAlign = "center";
  ctx.fillStyle = p.team === "red" ? "#d6336c" : "#1c7ed6";
  ctx.fillText(p.name, pu.x, pu.y + 22);
  ctx.restore();
}

/* ============================================================
   4. 勝利演出
   ============================================================ */
function endMatch() {
  if (M.over) return;
  M.over = true;
  hideBanner();
  const winTeam = aliveCount("red") > 0 ? "red" : "blue";
  M.winTeam = winTeam;
  const label = winTeam === "red" ? "🔴 あかチーム" : "🔵 あおチーム";

  // 勝った チームを 中央に ならべて 大きく ジャンプ(勝者だけの画面)
  const winners = M.players.filter((p) => p.team === winTeam && p.alive);
  M.winners = winners;
  const n = winners.length;
  const cols = Math.min(n, 5);
  const rows = Math.ceil(n / cols);
  const winH = Util.clamp(210 - n * 9, 100, 200);
  const gap = 200;
  winners.forEach((p, i) => {
    const row = Math.floor(i / cols);
    const idxInRow = i - row * cols;
    const inRow = Math.min(cols, n - row * cols);   // その行の 人数(中央ぞろえ)
    const x = 640 - (inRow - 1) * gap / 2 + idxInRow * gap;
    const y = rows === 1 ? 430 : 350 + 180 * row;
    p.puppet.h = winH;
    p.puppet.x = x; p.puppet.y = y; p.tx = x; p.ty = y;
    p.puppet.facing = 1;
    p.hopCd = Util.rand(0, 0.6);
  });

  const title = $("winTitle");
  title.textContent = `${label}の かち!`;
  title.className = winTeam;
  $("winOverlay").classList.remove("hidden");

  Sound.fanfare();
  Ui.confetti();
  const withVoice = winners.filter((w) => w.voices);
  if (withVoice.length) Sound.playVoice(Util.choice(withVoice).voices, ["joy"]);
}

$("rematchBtn").onclick = () => { Sound.pon(); startMatch(); };   // 同メンバー・同チームで さいせん
$("reselectBtn").onclick = () => {
  Sound.tap();
  stopLoop();
  show("selectScreen");
  renderGallery();
};
$("topBtn").onclick = () => { Sound.tap(); location.href = "../index.html"; };

/* ---- 起動 ---- */
show("selectScreen");
initSelect();
</script>
