<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ドッヂボール</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
<style>
  /* ===== ドッヂボール専用スタイル(1ファイル完結) ===== */

  /* --- チーム発表 --- */
  .db-teams {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 10px;
    max-width: 980px;
    margin: 10px auto;
    flex-wrap: nowrap;
  }
  .db-teamcol {
    flex: 1 1 0;
    min-width: 0;
    background: #fff;
    border-radius: 22px;
    border: 5px solid var(--cream-d);
    box-shadow: 0 6px 0 var(--cream-d);
    padding: 10px 8px 14px;
  }
  .db-teamcol.red  { border-color: var(--pink); box-shadow: 0 6px 0 var(--pink-d); background: #fff0f6; }
  .db-teamcol.blue { border-color: var(--blue); box-shadow: 0 6px 0 var(--blue-d); background: #e7f5ff; }
  .db-teamcol h3 { margin: 4px 0 8px; font-size: clamp(20px, 4.5vw, 30px); }
  .db-teamcol.red  h3 { color: var(--pink-d); }
  .db-teamcol.blue h3 { color: var(--blue-d); }
  .db-members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
    gap: 8px;
    min-height: 90px;
    align-content: start;
  }
  .db-mem { text-align: center; animation: db-pop .4s cubic-bezier(.2,1.6,.4,1) both; }
  .db-mem img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: contain;
    background: #fff;
    border-radius: 12px;
    border: 3px solid #eee2d0;
  }
  .db-mem .nm { font-size: 13px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .db-vs { align-self: center; font-size: clamp(24px, 6vw, 46px); font-weight: bold; color: #a99; flex: 0 0 auto; }
  @keyframes db-pop { from { transform: scale(.2) rotate(-12deg); opacity: 0; } }

  /* --- 試合HUD(残り人数) --- */
  .db-hud {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: bold;
    font-size: clamp(20px, 5vw, 34px);
    margin: 6px 0 8px;
    flex-wrap: wrap;
  }
  .db-hud span { background: #fff; border-radius: 999px; padding: 4px 18px; box-shadow: 0 3px 0 rgba(150,110,70,.16); white-space: nowrap; }
  .db-hud .db-red  { color: var(--pink-d); }
  .db-hud .db-blue { color: var(--blue-d); }
  .db-hud .db-num { font-size: 1.5em; font-weight: 800; margin: 0 1px; }
  .db-hud .db-lbl { font-size: .6em; font-weight: bold; }
  .db-hud .db-vslabel { background: none; box-shadow: none; color: #8a7a68; padding: 0 2px; }

  /* --- ステージ(コートの canvas + オーバーレイ) --- */
  .db-stage { position: relative; max-width: 1000px; margin: 0 auto; }

  /* --- じっきょうテロップ(下部の黒おび・プレイを じゃましない) --- */
  .db-banner {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 40;
    text-align: center;
    font-weight: bold;
    font-size: clamp(15px, 3.2vw, 28px);
    line-height: 1.2;
    color: #fff;
    background: linear-gradient(to top, rgba(18,12,6,.86), rgba(18,12,6,.62));
    padding: 9px 16px 11px;
    border-top: 5px solid var(--yellow);
    pointer-events: none;
    animation: db-banner-in .22s ease-out both;
  }
  .db-banner.red  { border-top-color: var(--pink); }
  .db-banner.blue { border-top-color: var(--blue); }
  .db-banner .db-nm { font-weight: 800; }
  .db-banner .db-nm.red  { color: #ff9ec7; }
  .db-banner .db-nm.blue { color: #74c0fc; }
  @keyframes db-banner-in { from { transform: translateY(100%); opacity: 0; } }

  /* --- 勝利オーバーレイ(canvasの上に タイトル+ボタン) --- */
  .db-winbar {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    pointer-events: none;
  }
  .db-winbar h2 {
    margin: 0;
    font-size: clamp(26px, 6.5vw, 52px);
    text-align: center;
    background: rgba(255,255,255,.9);
    border-radius: 999px;
    padding: 6px 26px;
    box-shadow: 0 5px 0 rgba(150,110,70,.18);
    pointer-events: auto;
  }
  .db-winbar h2.red  { color: var(--pink-d); }
  .db-winbar h2.blue { color: var(--blue-d); }
  .db-winbar .db-winbtns { pointer-events: auto; width: 100%; }
  .db-winbar .row { margin: 6px 0; }

  /* --- ルールのトグル(TOP) --- */
  .db-rules {
    max-width: 560px;
    margin: 14px auto 6px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .db-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border: 3px solid #eee2d0;
    border-radius: 16px;
    padding: 10px 14px;
    text-align: left;
  }
  .db-rule-txt { flex: 1; min-width: 0; }
  .db-rule-txt b { display: block; font-size: 17px; color: var(--ink); }
  .db-rule-txt span { display: block; font-size: 12.5px; color: #8a7a68; }
  .db-toggle {
    flex: 0 0 auto;
    width: 68px; height: 38px;
    border-radius: 999px;
    border: none;
    background: #d9cfc0;
    position: relative;
    cursor: pointer;
    transition: background .15s;
    padding: 0;
  }
  .db-toggle .db-knob {
    position: absolute; top: 4px; left: 4px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
    transition: left .15s;
  }
  .db-toggle.on { background: var(--green); }
  .db-toggle.on .db-knob { left: 34px; }
  .db-rule.disabled { opacity: .45; }
  .db-rule.disabled .db-toggle { cursor: default; }

  @media (max-width: 560px) {
    /* スマホ縦:ゲーム中は ヘッダーが「← もどる」フローティングになるので
       人数HUDが かぶらないよう 上に すきまを あける */
    .db-hud { margin-top: 50px; font-size: clamp(18px, 4.6vw, 26px); }
    .db-winbar .btn.big { font-size: 20px; padding: 14px 20px; }
  }
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1>🏐 ドッヂボール</h1>
  <div class="spacer"></div>
</header>

<main>
  <!-- 1. キャラ選択 -->
  <div id="selectScreen">
    <div class="panel">
      <h2>たたかう キャラを えらんでね<br><span style="font-size:18px;font-weight:normal;color:#8a7a68">(タッチで えらぶ / はずす)</span></h2>
      <div class="gallery" id="gallery"></div>
      <p class="note" id="selNote" style="font-size:17px;font-weight:bold;min-height:22px"></p>

      <div class="db-rules">
        <div class="db-rule">
          <div class="db-rule-txt"><b>アウトの子は 外野(がいや)へ</b><span>コートの そとに でて、まだ 内野を あてられる</span></div>
          <button class="db-toggle" id="ruleOutfield" type="button" role="switch" aria-checked="false"><span class="db-knob"></span></button>
        </div>
        <div class="db-rule" id="ruleRevivalRow">
          <div class="db-rule-txt"><b>外野で あてたら 内野に もどれる</b><span>「外野へ」ルールが ONのときだけ つかえる</span></div>
          <button class="db-toggle" id="ruleRevival" type="button" role="switch" aria-checked="false"><span class="db-knob"></span></button>
        </div>
      </div>

      <div class="row"><button class="btn big pink" id="decideBtn">けってい!</button></div>
      <p class="note">えらんだ みんなが 2チームに わかれて、じどうで たいせんするよ。みているだけでOK!</p>
    </div>
  </div>

  <!-- 2. チーム発表 -->
  <div id="teamScreen" class="hidden">
    <h2 style="text-align:center;margin:10px 0 4px;font-size:clamp(22px,5vw,32px)">🎪 チームわけ!</h2>
    <div class="db-teams">
      <div class="db-teamcol red"><h3>🔴 あかチーム</h3><div class="db-members" id="redMembers"></div></div>
      <div class="db-vs">VS</div>
      <div class="db-teamcol blue"><h3>🔵 あおチーム</h3><div class="db-members" id="blueMembers"></div></div>
    </div>
    <div class="row" id="teamBtns">
      <button class="btn big yellow" id="redoBtn">やりなおす</button>
      <button class="btn big green"  id="startBtn">スタート!</button>
    </div>
  </div>

  <!-- 3. 試合(全自動)+ 4. 勝利演出 -->
  <div id="playScreen" class="hidden">
    <div class="db-hud">
      <span class="db-red"  id="hudRed">🔴あか 0にん</span>
      <span class="db-vslabel">vs</span>
      <span class="db-blue" id="hudBlue">🔵あお 0にん</span>
    </div>
    <div class="db-stage">
      <canvas id="cv" class="stage" width="1280" height="720"></canvas>
      <div class="db-banner hidden" id="banner"></div>
      <div class="db-winbar hidden" id="winOverlay">
        <h2 id="winTitle">かち!</h2>
        <div class="db-winbtns">
          <div class="row"><button class="btn big pink" id="rematchBtn">もういっかい しょうぶ!</button></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/rig.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");
const CW = 1280, CH = 720;

/* ---- 画面きりかえ ---- */
const SCREENS = ["selectScreen", "teamScreen", "playScreen"];
function show(id) { for (const s of SCREENS) $(s).classList.toggle("hidden", s !== id); }

/* ---- コート座標(px・足もと基準) ---- */
/* 左右ぶんかつ:左=あか内野、右=あお内野。
   外野は「相手の うしろ」= あか外野は 右はし、あお外野は 左はし。
   外野ルールOFFで やられた子は じぶんの がわの はし(あか=左、あお=右)へ さる。 */
const YMIN = 175, YMAX = 632;
const LINE = 640;                       // センターライン(たて)
const RED_INNER_X  = [200, 560];        // あか(左)内野
const BLUE_INNER_X = [720, 1080];       // あお(右)内野
const LSTRIP = 76, RSTRIP = 1204;       // 左右のはし(たて1れつ)
function innerXB(team) { return team === "red" ? RED_INNER_X : BLUE_INNER_X; }
function outfieldX(team) { return team === "red" ? RSTRIP : LSTRIP; }   // 外野=相手のうしろ
function goneX(team) { return team === "red" ? LSTRIP : RSTRIP; }       // 去る=じぶんの がわ
function other(team) { return team === "red" ? "blue" : "red"; }

/* ---- ルール(TOPの トグルで きりかえ) ---- */
const rules = { outfield: false, revival: false };

/* ---- 状態 ---- */
let allChars = [];
const selectedIds = new Set();
let roster = [];               // [{rec,name,voices}]
let teams = { red: [], blue: [] };
let teamGen = 0;
let M = null;
let rafId = 0;

/* ============================================================
   1. キャラ選択
   ============================================================ */
async function initSelect() {
  const recs = await Store.ensureSamples();
  allChars = recs.filter((r) => r.cat === "char");
  allChars.forEach((r) => selectedIds.add(r.id));   // さいしょは ぜんいん
  renderGallery();
}
function renderGallery() {
  const el = $("gallery");
  el.innerHTML = "";
  for (const r of allChars) {
    const d = document.createElement("div");
    d.className = "thumb" + (selectedIds.has(r.id) ? " selected" : "");
    d.innerHTML = `<img src="${r.dataURL}" alt=""><div class="name">${r.name || ""}</div>`;
    d.onclick = () => {
      Sound.tap();
      selectedIds.has(r.id) ? selectedIds.delete(r.id) : selectedIds.add(r.id);
      renderGallery();
    };
    el.appendChild(d);
  }
  refreshDecide();
}
function refreshDecide() {
  const n = selectedIds.size;
  const btn = $("decideBtn"), note = $("selNote");
  if (n < 4) {
    btn.disabled = true;
    note.textContent = `あと ${4 - n}にん えらんでね(4にん いじょうで はじめられるよ)`;
    note.style.color = "#d6336c";
  } else {
    btn.disabled = false;
    note.textContent = `${n}にんで たいせん!`;
    note.style.color = "#2f9e44";
  }
}
/* ---- ルールのトグル ---- */
function renderRules() {
  const o = $("ruleOutfield"), r = $("ruleRevival"), rRow = $("ruleRevivalRow");
  o.classList.toggle("on", rules.outfield);
  o.setAttribute("aria-checked", String(rules.outfield));
  r.classList.toggle("on", rules.revival);
  r.setAttribute("aria-checked", String(rules.revival));
  rRow.classList.toggle("disabled", !rules.outfield);   // 外野OFFなら 復活は えらべない
}
$("ruleOutfield").onclick = () => {
  Sound.tap();
  rules.outfield = !rules.outfield;
  if (!rules.outfield) rules.revival = false;   // 外野OFFで 復活も OFF
  renderRules();
};
$("ruleRevival").onclick = () => {
  if (!rules.outfield) { Sound.bad(); return; }   // 外野ONのときだけ
  Sound.tap();
  rules.revival = !rules.revival;
  renderRules();
};
renderRules();

$("decideBtn").onclick = () => {
  if (selectedIds.size < 4) { Sound.bad(); return; }
  Sound.pon();
  roster = allChars
    .filter((r) => selectedIds.has(r.id))
    .map((r) => ({ rec: r, name: r.name || "", voices: r.voices || null }));
  splitTeams();
  goTeamReveal();
};

/* ============================================================
   2. チーム発表
   ============================================================ */
function splitTeams() {
  const sh = Util.shuffle(roster);
  const half = Math.ceil(sh.length / 2);   // 奇数なら あかが 1人 おおい
  teams.red = sh.slice(0, half);
  teams.blue = sh.slice(half);
}
function goTeamReveal() { show("teamScreen"); revealTeams(); }
async function revealTeams() {
  const gen = ++teamGen;
  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));
  $("redMembers").innerHTML = "";
  $("blueMembers").innerHTML = "";
  $("startBtn").disabled = true;
  $("redoBtn").disabled = true;

  const order = [];
  const maxLen = Math.max(teams.red.length, teams.blue.length);
  for (let i = 0; i < maxLen; i++) {
    if (teams.red[i])  order.push(["red", teams.red[i]]);
    if (teams.blue[i]) order.push(["blue", teams.blue[i]]);
  }

  await sleep(350);
  for (const [team, mem] of order) {
    if (gen !== teamGen) return;
    drumroll();
    await sleep(360);
    if (gen !== teamGen) return;
    const box = $(team === "red" ? "redMembers" : "blueMembers");
    const d = document.createElement("div");
    d.className = "db-mem";
    d.innerHTML = `<img src="${mem.rec.dataURL}" alt=""><div class="nm">${mem.name}</div>`;
    box.appendChild(d);
    Sound.pon();
    await sleep(180);
  }
  if (gen !== teamGen) return;
  $("startBtn").disabled = false;
  $("redoBtn").disabled = false;
  Ui.msg("よういは いい?", 1200, "#2f9e44");
}
function drumroll() {
  for (let i = 0; i < 5; i++) Sound.beep(180 + i * 6, 0.04, "square", 0.06, i * 0.05);
}
$("redoBtn").onclick = () => { Sound.tap(); splitTeams(); revealTeams(); };
$("startBtn").onclick = () => {
  if ($("startBtn").disabled) return;
  teamGen++;
  Sound.pon();
  startMatch();
};

/* ============================================================
   3. 試合(全自動・Canvas + Puppet)
   ============================================================ */
const WIND = 0.5, FLY = 0.5, RESOLVE = 1.0, INTRO = 1.2;

async function startMatch() {
  stopLoop();
  show("playScreen");
  $("banner").classList.add("hidden");
  $("winOverlay").classList.add("hidden");

  // 人数に あわせて キャラの おおきさを きめる
  const perMax = Math.max(teams.red.length, teams.blue.length);
  const hBase = Util.clamp(152 - perMax * 7, 76, 150);

  // すべての キャラを パペット化(白背景を切りぬき+手足分割)
  const players = [];
  for (const [team, list] of [["red", teams.red], ["blue", teams.blue]]) {
    for (const b of list) {
      const parts = await Rig.load(b.rec);
      players.push({
        name: b.name, voices: b.voices, team,
        puppet: new Puppet(parts, { h: hBase, facing: 1 }),
        zone: "inner", outState: null, fall: 0, hBase,
        tx: 640, ty: 360, homeX: 640, homeY: 360, wander: 0, hopCd: 0,
      });
    }
  }

  M = {
    players, hBase,
    ballTeam: Math.random() < 0.5 ? "red" : "blue",
    phase: "intro", phaseT: 0, matchT: 0,
    thrower: null, target: null, outcome: null,
    ballX: 640, ballY: 360, ballFromX: 640, ballFromY: 360, ballToX: 640, ballToY: 360,
    throwGap: 1.0, over: false, winTeam: null, stop: false,
  };

  layoutTeam("red", true);
  layoutTeam("blue", true);
  for (const p of players) { p.puppet.x = p.tx; p.puppet.y = p.ty; p.puppet.facing = idleFacing(p); }
  M.ballX = M.ballTeam === "red" ? RED_INNER_X[1] : BLUE_INNER_X[0];
  M.ballY = (YMIN + YMAX) / 2;

  updateHud();
  Ui.msg("しあい かいし!", 1200, "#ff922b");
  Sound.fanfare();

  let last = performance.now();
  (function loop(now) {
    if (!M || M.stop) return;
    const dt = Math.min(0.04, (now - last) / 1000); last = now;
    updateMatch(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  })(last);
}
function stopLoop() { if (rafId) cancelAnimationFrame(rafId); rafId = 0; if (M) M.stop = true; }

function innerP(team) { return M.players.filter((p) => p.team === team && p.zone === "inner"); }
function outP(team) { return M.players.filter((p) => p.team === team && p.zone === "out"); }
function activeP(team) { return M.players.filter((p) => p.team === team && (p.zone === "inner" || p.zone === "out")); }
function innerCount(team) { return innerP(team).length; }

/* ふだん むく むき(内野=相手コートの方、外野=相手の内野の方) */
function idleFacing(p) {
  if (p.zone === "out") return p.team === "red" ? -1 : 1;   // 外野は 相手の内野を むく
  return p.team === "red" ? 1 : -1;
}

/* 足もとの ホームいちを セット(たおれ中は 動かさない) */
function setHome(p, x, y, snap) {
  p.homeX = x; p.homeY = y;
  if (p.outState !== "fall" && p.outState !== "up") { p.tx = x; p.ty = y; }
  if (snap) { p.puppet.x = x; p.puppet.y = y; }
}

/* チームの キャラを ゾーンごとに ならべ直す */
function layoutTeam(team, snap) {
  // 内野:グリッド
  const inner = innerP(team);
  const xb = innerXB(team);
  const N = inner.length;
  const cols = Math.min(N, N <= 4 ? 2 : 3) || 1;   // 半面は せまいので たてに ならべる
  const rows = Math.ceil(N / cols);
  inner.forEach((p, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = cols === 1 ? (xb[0] + xb[1]) / 2 : xb[0] + (xb[1] - xb[0]) * col / (cols - 1);
    const y = rows === 1 ? (YMIN + YMAX) / 2 : YMIN + (YMAX - YMIN) * row / (rows - 1);
    setHome(p, x, y, snap);
  });
  // 外野・去った子:はしに たて1れつ
  placeStrip(outP(team), outfieldX(team), snap);
  placeStrip(M.players.filter((p) => p.team === team && p.zone === "gone"), goneX(team), snap);
}
function placeStrip(list, x, snap) {
  const n = list.length;
  list.forEach((p, i) => {
    const span = Math.max(1, n - 1);
    const y = n === 1 ? 404 : YMIN + (YMAX - YMIN) * i / span;
    setHome(p, x, y, snap);
  });
}

function updateHud() {
  const html = (emoji, team) => {
    let s = `${emoji} <span class="db-lbl">のこり</span> <span class="db-num">${innerCount(team)}</span><span class="db-lbl">にん</span>`;
    if (rules.outfield) s += ` <span class="db-lbl">がいや${outP(team).length}</span>`;
    return s;
  };
  $("hudRed").innerHTML  = html("🔴", "red");
  $("hudBlue").innerHTML = html("🔵", "blue");
}

function startThrow() {
  const attackers = activeP(M.ballTeam);        // 内野+外野が なげられる
  const defTeam = other(M.ballTeam);
  const defenders = innerP(defTeam);            // ねらえるのは 相手の 内野だけ
  if (!attackers.length || !defenders.length) { endMatch(); return; }

  const thrower = Util.choice(attackers);
  const target = Util.choice(defenders);

  // けっか(あたる/よける/キャッチ)を さきに きめる。アウトになるのは あたり だけ
  let hit = 0.55, dodge = 0.30;            // のこりは catch(0.15)
  if (defenders.length === 1) { hit = 0.34; dodge = 0.40; }  // さいごの1人は ねばる
  if (M.matchT > 95) { hit = 0.82; dodge = 0.12; }           // ながびいたら 決着を いそぐ
  const roll = Math.random();
  const outcome = roll < hit ? "hit" : roll < hit + dodge ? "dodge" : "catch";

  M.thrower = thrower; M.target = target; M.outcome = outcome;
  M.phase = "wind"; M.phaseT = 0;

  // なげる人は 相手の方へ 一歩 でる
  const dir = Math.sign(target.puppet.x - thrower.puppet.x) || 1;
  thrower.tx = Util.clamp(thrower.homeX + dir * 46, 46, CW - 46);
  thrower.ty = Util.clamp((thrower.homeY + target.puppet.y) / 2, YMIN, YMAX);
}

function launchBall() {
  const t = M.thrower, g = M.target;
  M.ballFromX = t.puppet.x; M.ballFromY = t.puppet.y - t.puppet.h * 0.6;
  M.ballToX = g.puppet.x;   M.ballToY = g.puppet.y - g.puppet.h * 0.5;
  M.phase = "fly"; M.phaseT = 0;
  Sound.beep(520, 0.16, "square", 0.10, 0, 220);   // シュッ
}

function resolve() {
  const t = M.thrower, g = M.target, oc = M.outcome;
  const defTeam = g.team;

  if (oc === "hit") {
    const revived = hitOut(g, t);   // g アウト。外野の t が あてたら(復活ルール)もどる
    const msg = [nameSpan(t), txt(" が あてた! "), nameSpan(g), txt(" アウト!")];
    if (revived) msg.push(txt("  "), nameSpan(t), txt(" ふっかつ!"));
    showBanner(msg, defTeam);
    Sound.bad();
    Sound.playVoice(g.voices, ["fail", "ouch"]);
    if (revived) Sound.pon();
  } else if (oc === "catch") {
    // キャッチは アウトなし。うけとった 子が ボールを もつ(ナイスプレー)
    g.puppet.hop();
    showBanner([nameSpan(g), txt(" ナイスキャッチ!")], defTeam);
    Sound.pon(); Sound.good();
    Sound.playVoice(g.voices, ["joy"]);
  } else { // dodge
    g.ty = Util.clamp(g.homeY + (Math.random() < 0.5 ? -95 : 95), YMIN, YMAX);
    g.puppet.hop();
    showBanner([nameSpan(g), txt(" ひらり! よけた!")], defTeam);
    Sound.beep(760, 0.18, "square", 0.10, 0, 320);
  }

  // つぎに なげるのは まもっていた チーム(あか⇔あお こうご)
  M.ballTeam = defTeam;
  M.ballToX = g.puppet.x; M.ballToY = g.puppet.y - g.puppet.h * 0.5;
  updateHud();
  M.phase = "resolve"; M.phaseT = 0;
}

/* あたった子を アウトに(外野へ / 去る)。復活ルールで 投げ手が もどれば true */
function hitOut(target, thrower) {
  target.zone = rules.outfield ? "out" : "gone";   // 外野ルールONなら 外野で つづける
  target.outState = "fall"; target.outT = 0; target.fall = 0;   // たおれ演出 スタート
  let revived = false;
  if (rules.outfield && rules.revival && thrower.zone === "out") {
    thrower.zone = "inner";                 // 外野→内野に もどる
    thrower.outState = null; thrower.fall = 0;
    thrower.puppet.h = M.hBase;             // 内野サイズに もどす
    thrower.puppet.hop();
    revived = true;
  }
  layoutTeam(target.team);                  // ならべ直し(外野いち・去る先を 計算)
  if (revived) layoutTeam(thrower.team);
  return revived;
}

/* テロップの ぶひん:キャラ名は チーム色、そのほかは 白文字 */
function nameSpan(p) {
  const s = document.createElement("span");
  s.className = "db-nm " + p.team;
  s.textContent = p.name;
  return s;
}
function txt(t) { return document.createTextNode(t); }

function showBanner(nodes, edgeTeam) {
  const b = $("banner");
  b.className = "db-banner " + edgeTeam;   // うわべの ラインの色
  b.textContent = "";
  for (const n of nodes) b.appendChild(n);
  b.classList.remove("hidden");
  // アニメを 再生し直す
  b.style.animation = "none"; void b.offsetWidth; b.style.animation = "";
}
function hideBanner() { $("banner").classList.add("hidden"); }

function updateMatch(dt) {
  M.phaseT += dt;
  if (!M.over && M.phase !== "intro") M.matchT += dt;

  if (!M.over) {
    if (M.phase === "intro") {
      if (M.phaseT >= INTRO) startThrow();
    } else if (M.phase === "wind") {
      if (M.phaseT >= WIND) launchBall();
    } else if (M.phase === "fly") {
      if (M.phaseT >= FLY) resolve();
    } else if (M.phase === "resolve") {
      if (M.phaseT >= RESOLVE) {
        hideBanner();
        if (innerCount("red") === 0 || innerCount("blue") === 0) { endMatch(); return; }
        const total = innerCount("red") + innerCount("blue");
        M.throwGap = Util.clamp(0.25 + total * 0.045, 0.3, 0.85);   // 人数が へると テンポUP
        layoutTeam("red"); layoutTeam("blue");                      // ラリーごとに 整列しなおす
        M.phase = "gap"; M.phaseT = 0;
      }
    } else if (M.phase === "gap") {
      if (M.phaseT >= M.throwGap) startThrow();
    }

    // ボールの いち
    if (M.phase === "fly") {
      const s = Util.clamp(M.phaseT / FLY, 0, 1);
      M.ballX = M.ballFromX + (M.ballToX - M.ballFromX) * s;
      M.ballY = M.ballFromY + (M.ballToY - M.ballFromY) * s - Math.sin(Math.PI * s) * 90;
    } else if (M.phase === "wind" && M.thrower) {
      const t = M.thrower;
      M.ballX += (t.puppet.x - M.ballX) * Math.min(1, dt * 10);
      M.ballY += ((t.puppet.y - t.puppet.h * 0.6) - M.ballY) * Math.min(1, dt * 10);
    } else {
      M.ballX += (M.ballToX - M.ballX) * Math.min(1, dt * 6);
      M.ballY += (M.ballToY - M.ballY) * Math.min(1, dt * 6);
    }
  }

  // 勝利演出:みんなで その場で つぎつぎ とびはねて よろこぶ(音は 鳴らさない)
  if (M.over) {
    for (const p of M.celebrants) {
      p.hopCd -= dt;
      if (p.hopCd <= 0 && p.puppet.jumpT <= 0) { p.puppet.jumpT = 0.5; p.hopCd = Util.rand(0.05, 0.35); }
      p.puppet.walking = false;
      p.puppet.update(dt);
    }
    return;
  }

  // キャラの うごき
  for (const p of M.players) {
    const pu = p.puppet;
    const knocked = p.outState && p.outState !== "settled";   // やられ演出ちゅう

    if (knocked) {
      // たおれる → たちあがる → 外野(or コートの そと)へ あるいて いく
      p.outT += dt;
      if (p.outState === "fall") {
        p.fall = Util.clamp(p.outT / 0.22, 0, 1);            // パタッと たおれる
        if (p.outT >= 0.6) { p.outState = "up"; p.outT = 0; }
      } else if (p.outState === "up") {
        p.fall = 1 - Util.clamp(p.outT / 0.3, 0, 1);          // よいしょと おきあがる
        if (p.outT >= 0.32) {
          p.outState = "leave"; p.outT = 0; p.fall = 0;
          pu.h = p.zone === "gone" ? p.hBase * 0.6 : p.hBase * 0.86;   // 去る子は小さく、外野は少し小さく
          p.tx = p.homeX; p.ty = p.homeY;                     // 外野/去る先へ
        }
      }
      if (p.outState === "fall" || p.outState === "up") { pu.walking = false; pu.update(dt); continue; }
    } else if (p.zone === "inner" && p !== M.thrower && (M.phase === "gap" || M.phase === "intro")) {
      // 内野は ホーム付近を うろうろ
      p.wander -= dt;
      if (p.wander <= 0) {
        p.wander = Util.rand(0.5, 1.3);
        const xb = innerXB(p.team);
        p.tx = Util.clamp(p.homeX + Util.rand(-35, 35), xb[0] - 6, xb[1] + 6);
        p.ty = Util.clamp(p.homeY + Util.rand(-40, 40), YMIN, YMAX);
      }
    }

    // ターゲットへ 移動
    const dx = p.tx - pu.x, dy = p.ty - pu.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 3) {
      const sp = knocked ? 320 : (p === M.thrower ? 240 : 120);
      const step = Math.min(dist, sp * dt);
      pu.x += dx / dist * step;
      pu.y += dy / dist * step;
      pu.walking = true;
      if (Math.abs(dx) > 2) pu.facing = Math.sign(dx);
    } else {
      pu.walking = false;
      if (p.outState === "leave") p.outState = "settled";
      if (!knocked) pu.facing = idleFacing(p);   // ふだんは 相手の方を むく
    }
    pu.update(dt);
  }
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  if (M.over) { drawVictory(); return; }
  // 床(左=あか内野、右=あお内野)
  ctx.fillStyle = "#fbf7ee"; ctx.fillRect(0, 0, CW, CH);
  ctx.fillStyle = "rgba(255,107,157,.12)"; ctx.fillRect(0, 0, LINE, CH);
  ctx.fillStyle = "rgba(77,171,247,.12)";  ctx.fillRect(LINE, 0, CW - LINE, CH);
  // 左右のはし:外野ルールONなら 外野(相手のうしろ)、OFFなら ただの そとがわ
  const SW = 150;   // はしの はば
  if (rules.outfield) {
    ctx.fillStyle = "rgba(77,171,247,.18)";  ctx.fillRect(0, 0, SW, CH);        // 左=あお外野
    ctx.fillStyle = "rgba(255,107,157,.18)"; ctx.fillRect(CW - SW, 0, SW, CH);  // 右=あか外野
    ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
    ctx.fillStyle = "rgba(28,126,214,.5)";  ctx.fillText("がいや", SW / 2, 34);
    ctx.fillStyle = "rgba(214,51,108,.5)";  ctx.fillText("がいや", CW - SW / 2, 34);
    ctx.textAlign = "left";
  } else {
    ctx.fillStyle = "rgba(150,130,110,.10)";
    ctx.fillRect(0, 0, SW, CH); ctx.fillRect(CW - SW, 0, SW, CH);
  }
  // 内野の しきり線(はしと 内野の あいだ)+ センターライン(たて)
  ctx.save();
  ctx.setLineDash([26, 20]); ctx.lineWidth = 5; ctx.strokeStyle = "rgba(120,90,60,.35)";
  ctx.beginPath(); ctx.moveTo(LINE, 30); ctx.lineTo(LINE, CH - 30); ctx.stroke();
  if (rules.outfield) {
    ctx.lineWidth = 3; ctx.strokeStyle = "rgba(120,90,60,.22)";
    ctx.beginPath(); ctx.moveTo(SW, 30); ctx.lineTo(SW, CH - 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CW - SW, 30); ctx.lineTo(CW - SW, CH - 30); ctx.stroke();
  }
  ctx.restore();

  // キャラ(奥=足もとYが小さい ものから)
  const order = M.players.slice().sort((a, b) => a.puppet.y - b.puppet.y);
  for (const p of order) drawPlayer(p);

  // ボール(試合中のみ・最前面)
  if (!M.over) drawBall();
  ctx.textAlign = "left";
}

/* はっきり見える ドッヂボール(絵文字だと環境で 出ないので canvas で描く) */
function drawBall() {
  const x = M.ballX, y = M.ballY;
  const flying = M.phase === "fly";
  const r = (flying ? 30 : 25) * (0.42 + 0.58 * Math.min(1, M.hBase / 120));
  const spin = M.ballX * 0.03;   // ころがり回転

  ctx.save();
  // 影(ふわっと)
  ctx.fillStyle = "rgba(60,40,20,.18)";
  ctx.beginPath(); ctx.ellipse(x, y + r * 0.95, r * 0.95, r * 0.34, 0, 0, 7); ctx.fill();
  // 本体(立体感のある オレンジの ボール)
  const g = ctx.createRadialGradient(x - r * 0.35, y - r * 0.4, r * 0.15, x, y, r);
  g.addColorStop(0, "#ffe0b8"); g.addColorStop(0.45, "#ff922b"); g.addColorStop(1, "#e8590c");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  ctx.lineWidth = Math.max(3, r * 0.16); ctx.strokeStyle = "#fff"; ctx.stroke();
  // ボールの すじ(白ライン・回転する)
  ctx.save();
  ctx.translate(x, y); ctx.rotate(spin);
  ctx.lineWidth = Math.max(2, r * 0.1); ctx.strokeStyle = "rgba(255,255,255,.9)";
  ctx.beginPath(); ctx.arc(0, -r * 0.15, r * 0.85, 0.55, Math.PI - 0.55); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,  r * 0.15, r * 0.85, Math.PI + 0.55, -0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.stroke();
  ctx.restore();
  // ハイライト
  ctx.fillStyle = "rgba(255,255,255,.75)";
  ctx.beginPath(); ctx.arc(x - r * 0.34, y - r * 0.4, r * 0.2, 0, 7); ctx.fill();
  ctx.restore();
}

/* 勝利画面:みんな(全員)を えがく。勝ち残りは 中央に 大きく */
function drawVictory() {
  const g = ctx.createLinearGradient(0, 0, 0, CH);
  g.addColorStop(0, M.winTeam === "red" ? "#ffe3ee" : "#e3f0ff");
  g.addColorStop(1, "#fffdf5");
  ctx.fillStyle = g; ctx.fillRect(0, 0, CW, CH);

  const order = M.celebrants.slice().sort((a, b) => a.puppet.y - b.puppet.y);
  const win = new Set(M.winners);
  for (const p of order) {
    ctx.save();
    if (!win.has(p)) ctx.globalAlpha = 0.9;   // ほかの子は ほんの少しだけ ひかえめ
    p.puppet.draw(ctx);
    ctx.font = win.has(p) ? "bold 24px sans-serif" : "bold 17px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = p.team === "red" ? "#d6336c" : "#1c7ed6";
    ctx.fillText(p.name, p.puppet.x, p.puppet.y + (win.has(p) ? 26 : 18));
    ctx.restore();
  }
  ctx.textAlign = "left";
}

function drawPlayer(p) {
  const pu = p.puppet;
  ctx.save();
  if (p.zone === "gone" && p.outState === "settled") ctx.globalAlpha = 0.45;   // 去った子だけ うすく
  // ボールを もっている人は 光る
  if (!M.over && M.thrower === p && M.phase === "wind") {
    ctx.save();
    ctx.fillStyle = "rgba(255,212,59,.45)";
    ctx.beginPath(); ctx.arc(pu.x, pu.y - pu.h * 0.5, pu.h * 0.62, 0, 7); ctx.fill();
    ctx.restore();
  }
  // たおれ演出:足もとを 中心に くるっと たおれる
  if (p.fall > 0) {
    const dir = p.team === "red" ? -1 : 1;   // あかは 左へ、あおは 右へ たおれる
    ctx.save();
    ctx.translate(pu.x, pu.y);
    ctx.rotate(p.fall * 1.45 * dir);
    ctx.translate(-pu.x, -pu.y);
    pu.draw(ctx);
    ctx.restore();
  } else {
    pu.draw(ctx);
  }
  // なまえ
  ctx.font = "bold 20px sans-serif";
  ctx.textAlign = "center";
  ctx.fillStyle = p.team === "red" ? "#d6336c" : "#1c7ed6";
  ctx.fillText(p.name, pu.x, pu.y + 22);
  ctx.restore();
}

/* ============================================================
   4. 勝利演出
   ============================================================ */
function endMatch() {
  if (M.over) return;
  M.over = true;
  hideBanner();
  const winTeam = innerCount("red") > 0 ? "red" : "blue";
  M.winTeam = winTeam;
  const label = winTeam === "red" ? "🔴 あかチーム" : "🔵 あおチーム";

  // 勝ったチームだけ 登場(負けチームは 出さない)。勝ち残り(内野)が 主役
  const team = M.players.filter((p) => p.team === winTeam);
  const survivors = team.filter((p) => p.zone === "inner");
  const rest = team.filter((p) => p.zone !== "inner");   // 勝ちチームの 外野・去った子も いっしょに
  M.winners = survivors.length ? survivors : team;       // 全滅同着など念のため
  M.celebrants = team;
  // みんな 元気に もどす(たおれ・去りを リセット)
  for (const p of team) { p.fall = 0; p.outState = null; p.zone = "inner"; p.puppet.jumpT = 0; }

  // 主役(勝ち残り)は 中央に 大きく
  placeRow(M.winners, 405, Util.clamp(196 - M.winners.length * 11, 104, 176), 5);
  // 勝ちチームの ほかの子も 上下に わけて 小さめに(いっしょに おいわい)
  const oH = Util.clamp(104 - rest.length * 3, 62, 92);
  const half = Math.ceil(rest.length / 2);
  placeRow(rest.slice(0, half), 205, oH, 9);      // 上のだん(奥)
  placeRow(rest.slice(half),    600, oH, 9);      // 下のだん(手前)

  const title = $("winTitle");
  title.textContent = `${label}の かち!`;
  title.className = winTeam;
  $("winOverlay").classList.remove("hidden");

  Sound.fanfare();
  Ui.confetti();
  const withVoice = M.winners.filter((w) => w.voices);
  if (withVoice.length) Sound.playVoice(Util.choice(withVoice).voices, ["joy"]);
}

/* 勝利画面で リストを 中央ぞろえで ならべる(必要なら 折りかえす) */
function placeRow(list, cy, h, maxCols) {
  const n = list.length;
  if (!n) return;
  const cols = Math.min(maxCols, n);
  list.forEach((p, i) => {
    const row = Math.floor(i / cols);
    const inRow = Math.min(cols, n - row * cols);
    const idx = i - row * cols;
    const gap = inRow > 1 ? Math.min(190, 1120 / (inRow - 1)) : 0;
    p.puppet.h = h;
    p.puppet.x = 640 - gap * (inRow - 1) / 2 + idx * gap;
    p.puppet.y = cy + row * (h * 0.95 + 10);
    p.tx = p.puppet.x; p.ty = p.puppet.y;
    p.puppet.facing = 1;
    p.hopCd = Util.rand(0, 0.5);
  });
}

$("rematchBtn").onclick = () => { Sound.pon(); startMatch(); };   // 同メンバー・同チームで さいせん

/* ---- 起動 ---- */
show("selectScreen");
initSelect();
</script>
</body>
</html>
