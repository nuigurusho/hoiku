<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>よーいどん!</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1><img class="bar-icon" src="../assets/buttons/race.png" alt=""> よーいどん!</h1>
  <div class="spacer"></div>
</header>

<main>
  <div id="selectScreen">
    <div class="panel">
      <h2>はしる キャラを えらんでね(タッチで えらぶ/はずす)</h2>
      <div class="gallery" id="gallery"></div>

      <div class="mode-sec">🌈 ゆるふわ<span class="tag">キャラが かってに はしる・おうえんするだけ(1〜2さいから)</span></div>
      <div class="row"><button class="btn big pink" data-mode="cheer">📣 おうえんレース</button></div>

      <div class="mode-sec">🎵 れんしゅう<span class="tag">2にんで れんだたいせん・かちまけを たのしむ</span></div>
      <div class="row"><button class="btn big green" data-mode="vs">🎮 2にんで たいせん</button></div>

      <div class="mode-sec">🔥 ガチンコ<span class="tag">CPUたいせん・かつと つぎが とける・かちタイムランキング</span></div>
      <div class="row" id="gachiRow">
        <button class="btn big blue"   data-mode="c1">かんたん<br><span style="font-size:14px">CPU ゆっくり</span></button>
        <button class="btn big orange" data-mode="c2">ふつう<br><span style="font-size:14px">CPU ふつう</span></button>
        <button class="btn big purple" data-mode="c3">むずかしい<br><span style="font-size:14px">CPU はやい</span></button>
      </div>
      <div class="rank" id="rankView"></div>
      <p class="note">
        たいせん:ひだりがわを れんだ = 1P、みぎがわを れんだ = 2P(キーボードは F と J)<br>
        CPUたいせん:がめんを れんだ(スペースでもOK)して CPUより はやく ゴール!<br>
        おうえんレース:キャラたちが かってに はしるよ。だれが かつか おうえんしよう!
      </p>
    </div>
  </div>

  <div id="playScreen" class="hidden">
    <div class="stage-wrap"><canvas id="cv" class="stage" width="1280" height="720"></canvas></div>
    <div class="row hidden" id="endRow">
      <button class="btn big green" id="againBtn">もういちど</button>
      <button class="btn gray" id="backBtn">キャラをえらびなおす</button>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script src="../js/rig.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");
const GOAL = 2400;
const GAME = "race";
const RANK_LABELS = ["かんたん", "ふつう", "むずかしい"];
const MODES = {
  cheer: { label: "おうえんレース", kind: "cheer" },
  vs:    { label: "2にんたいせん", kind: "vs" },
  c1: { label: "かんたん",   kind: "cpu", speed: 170, lv: 1 },
  c2: { label: "ふつう",     kind: "cpu", speed: 235, lv: 2 },
  c3: { label: "むずかしい", kind: "cpu", speed: 300, lv: 3 },
};

let allChars = [], selectedIds = new Set(), G = null, lastMode = "cheer";

async function initSelect() {
  const recs = await Store.ensureSamples();
  allChars = recs.filter((r) => r.cat === "char");
  allChars.slice(0, 2).forEach((r) => selectedIds.add(r.id));
  renderGal();
  refreshLocks();
}
function renderGal() {
  const el = $("gallery");
  el.innerHTML = "";
  for (const r of allChars) {
    const d = document.createElement("div");
    d.className = "thumb" + (selectedIds.has(r.id) ? " selected" : "");
    d.innerHTML = `<img src="${r.dataURL}"><div class="name">${r.name || ""}</div>`;
    d.onclick = () => {
      Sound.tap();
      selectedIds.has(r.id) ? selectedIds.delete(r.id) : selectedIds.add(r.id);
      renderGal();
    };
    el.appendChild(d);
  }
}
initSelect();

function picked(n) {
  let recs = allChars.filter((r) => selectedIds.has(r.id));
  if (recs.length < 2) recs = allChars.slice();
  return recs.slice(0, n);
}

function refreshLocks() {
  const lv = Tiers.unlock(GAME);
  document.querySelectorAll("#gachiRow .btn").forEach((b) => {
    const need = MODES[b.dataset.mode].lv;
    if (!b.dataset.orig) b.dataset.orig = b.innerHTML;
    b.classList.toggle("locked", need > lv);
    b.innerHTML = (need > lv ? "🔒 " : "") + b.dataset.orig;
  });
  $("rankView").innerHTML = Tiers.rankHtml(GAME, RANK_LABELS, { unit: "びょう" });
}

document.querySelectorAll("#selectScreen [data-mode]").forEach((b) => {
  b.onclick = () => {
    const m = MODES[b.dataset.mode];
    if (m.lv && m.lv > Tiers.unlock(GAME)) {
      Sound.bad();
      Ui.msg("まえのだんかいを クリアしてね", 1600, "#4dabf7");
      return;
    }
    start(b.dataset.mode);
  };
});
$("againBtn").onclick = () => start(lastMode);
$("backBtn").onclick = () => {
  if (G) G.stop = true;
  $("playScreen").classList.add("hidden");
  $("selectScreen").classList.remove("hidden");
  refreshLocks();
};

async function start(modeKey) {
  Sound.tap();
  lastMode = modeKey;
  const mode = MODES[modeKey];
  const kind = mode.kind;
  if (G) G.stop = true;

  const racers = [];
  if (kind === "cpu") {
    // プレイヤー + CPU の 1たい1
    const sel = picked(1);
    const playerRec = sel[0];
    const others = allChars.filter((r) => r.id !== playerRec.id);
    const cpuRec = others.length ? Util.choice(others) : playerRec;
    for (const [rec, isAi] of [[playerRec, false], [cpuRec, true]]) {
      const parts = await Rig.load(rec);
      racers.push({
        name: (isAi ? "CPU " : "") + (rec.name || ""),
        puppet: new Puppet(parts, { h: 150 }),
        prog: 0, v: 0, rank: 0, wob: Util.rand(0, 9),
        player: !isAi, ai: isAi,
      });
    }
  } else {
    const recs = picked(kind === "vs" ? 2 : 6);
    for (const rec of recs) {
      const parts = await Rig.load(rec);
      racers.push({
        name: rec.name || "",
        puppet: new Puppet(parts, { h: kind === "vs" ? 150 : Math.min(150, 560 / recs.length + 60) }),
        prog: 0, v: 0, rank: 0, wob: Util.rand(0, 9),
      });
    }
  }
  G = { mode, kind, cpuSpeed: mode.speed || 0, racers, stop: false, state: "ready", t: 0, finished: 0, ended: false };

  $("selectScreen").classList.add("hidden");
  $("playScreen").classList.remove("hidden");
  $("endRow").classList.add("hidden");

  // よーい…どん!
  Ui.msg("よーい…", 1100, "#4dabf7");
  Sound.tick();
  setTimeout(() => {
    if (G.stop) return;
    Ui.msg("どん!", 900, "#ff6b9d");
    Sound.pon();
    G.state = "run";
  }, 1300);

  let last = performance.now();
  (function loop(now) {
    if (G.stop) return;
    const dt = Math.min(0.04, (now - last) / 1000); last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  })(last);
}

/* れんだ入力:たいせん=左1P/右2P、CPUたいせん=どこでも1P */
cv.addEventListener("pointerdown", (e) => {
  if (!G || G.state !== "run") return;
  if (G.kind === "vs") {
    const p = Util.canvasPos(cv, e);
    dash(p.x < 640 ? 0 : 1);
  } else if (G.kind === "cpu") {
    dash(0);
  }
});
window.addEventListener("keydown", (e) => {
  if (!G || G.state !== "run" || e.repeat) return;
  if (G.kind === "vs") {
    if (e.code === "KeyF") dash(0);
    if (e.code === "KeyJ") dash(1);
  } else if (G.kind === "cpu") {
    if (e.code === "KeyF" || e.code === "Space" || e.code === "Enter") { dash(0); e.preventDefault(); }
  }
});
function dash(i) {
  const r = G.racers[i];
  if (!r || r.rank || r.ai) return;
  r.prog += 34;
  r.puppet.phase += 0.65;
  Sound.step();
}

function update(dt) {
  const g = G;
  if (g.state === "run") g.t += dt;
  for (const r of g.racers) {
    if (g.state === "run" && !r.rank) {
      if (g.kind === "cheer") {
        r.wob += dt;
        r.v = 190 + Math.sin(r.wob * 1.7) * 90 + Math.sin(r.wob * 4.3 + 1) * 60;
        r.prog += Math.max(40, r.v) * dt;
        r.puppet.walking = true;
      } else if (r.ai) {
        r.prog += g.cpuSpeed * dt;            // CPUは いっていの はやさ
        r.puppet.walking = true;
      } else {
        r.prog = Math.max(0, r.prog - 14 * dt); // れんだしないと ちょっともどる
        r.puppet.walking = false;
      }
      if (r.prog >= GOAL) {
        r.rank = ++g.finished;
        r.puppet.walking = false;
        if (g.kind === "cpu" && !g.ended) return finishCpu(g, r);
        if (r.rank === 1) { Sound.fanfare(); Ui.confetti(); Ui.msg(`${r.name || "1ばん"} のかち!🏆`, 2400); }
        else Sound.good();
        if (g.finished === g.racers.length) {
          g.state = "end";
          $("endRow").classList.remove("hidden");
        }
      }
    }
    r.puppet.update(dt);
  }
}

/* CPUたいせん:さきに ゴールした ほうで しょうはい */
function finishCpu(g, r) {
  g.ended = true;
  g.state = "end";
  $("endRow").classList.remove("hidden");
  if (r.player) {
    const secs = Math.max(1, Math.round(g.t * 10) / 10);
    Tiers.setUnlock(GAME, Math.min(3, g.mode.lv + 1));
    Tiers.addRank(GAME, g.mode.lv, r.name || "?", secs, { lowerIsBetter: true });
    Sound.fanfare(); Ui.confetti();
    Ui.msg(`かち!🏆 ${secs}びょう`, 2600);
  } else {
    Sound.bad();
    Ui.msg("CPUの かち…ざんねん!", 2400, "#9775fa");
  }
}

function draw() {
  const g = G;
  ctx.clearRect(0, 0, 1280, 720);
  const sky = ctx.createLinearGradient(0, 0, 0, 720);
  sky.addColorStop(0, "#a5d8ff"); sky.addColorStop(1, "#e7f5ff");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, 1280, 720);

  const n = g.racers.length;
  const laneH = 620 / n;
  g.racers.forEach((r, i) => {
    const laneY = 80 + laneH * (i + 1);
    // コース
    ctx.fillStyle = i % 2 ? "#96d06c" : "#a9dd7e";
    ctx.fillRect(0, laneY - laneH + 24, 1280, laneH - 8);
    // ゴールライン
    ctx.fillStyle = "#fff";
    for (let k = 0; k < 8; k++) {
      ctx.fillStyle = k % 2 ? "#fff" : "#4a3f35";
      ctx.fillRect(1190, laneY - laneH + 24 + (laneH - 8) / 8 * k, 16, (laneH - 8) / 8);
    }
    // はしるひと
    const x = 80 + (r.prog / GOAL) * 1100;
    r.puppet.x = x;
    r.puppet.y = laneY;
    r.puppet.facing = 1;
    r.puppet.draw(ctx);
    // なまえ・じゅんい
    ctx.font = "bold 24px sans-serif";
    ctx.fillStyle = "#4a3f35";
    ctx.fillText(r.name, 16, laneY - laneH + 52);
    if (r.rank) {
      const medal = ["", "🥇", "🥈", "🥉"][r.rank] || `${r.rank}い`;
      ctx.font = "44px serif";
      ctx.fillText(medal, x - 20, laneY - r.puppet.h - 16);
    }
  });

  if (g.kind === "vs" && g.state === "run") {
    ctx.font = "bold 30px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,107,157,.85)";
    ctx.fillText("← ひだりを れんだ!", 320, 60);
    ctx.fillStyle = "rgba(77,171,247,.85)";
    ctx.fillText("みぎを れんだ! →", 960, 60);
    ctx.textAlign = "left";
  } else if (g.kind === "cpu" && g.state === "run") {
    ctx.font = "bold 30px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,107,157,.9)";
    ctx.fillText("がめんを れんだして CPUに かとう!", 640, 60);
    ctx.textAlign = "left";
  }
}
</script>
</body>
</html>
