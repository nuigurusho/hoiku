<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>おえかきのたび</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1><img class="bar-icon" src="../assets/buttons/adventure.png" alt=""> おえかきのたび</h1>
  <div class="spacer"></div>
</header>

<main>
  <div id="selectScreen">
    <div class="panel">
      <h2>だれで ぼうけんする?</h2>
      <div class="gallery" id="charGallery"></div>
      <h2 style="margin-top:18px">どこを ぼうけんする?</h2>
      <div class="gallery" id="bgGallery"></div>

      <div class="mode-sec">🌈 ゆるふわ<span class="tag">じどうで ぼうけんするのを みるだけ(1〜2さいから)</span></div>
      <div class="row"><button class="btn big pink" data-mode="auto">🌈 じどうで ぼうけん</button></div>

      <div class="mode-sec">🎵 れんしゅう<span class="tag">じかんむせいげん・⭐10こ あつめて ゴール</span></div>
      <div class="row"><button class="btn big green" data-mode="ren">🎵 ぼうけんに しゅっぱつ!🚀</button></div>

      <div class="mode-sec">🔥 ガチンコ<span class="tag">せいげんじかんない・のこりタイムランキング・クリアで つぎが とけるよ</span></div>
      <div class="row" id="gachiRow">
        <button class="btn big blue"   data-mode="g1">かんたん<br><span style="font-size:14px">90びょう</span></button>
        <button class="btn big orange" data-mode="g2">ふつう<br><span style="font-size:14px">60びょう</span></button>
        <button class="btn big purple" data-mode="g3">むずかしい<br><span style="font-size:14px">45びょう</span></button>
      </div>
      <div class="rank" id="rankView"></div>
      <p class="note">← → キー か ゲームパッドで移動、スペース/ボタンでジャンプ。がめんのボタンでもOK!</p>
    </div>
  </div>

  <div id="playScreen" class="hidden">
    <div class="hud"><span id="starHud">⭐ 0 / 10</span><span id="timeHud" class="hidden"></span></div>
    <div class="stage-wrap"><canvas id="cv" class="stage" width="1280" height="720"></canvas></div>
    <div class="row hidden" id="clearRow">
      <button class="btn big green" id="againBtn">もういちど あそぶ</button>
      <button class="btn gray" id="selBtn">キャラをかえる</button>
    </div>
  </div>
</main>

<!-- タッチそうさ -->
<div class="touchpad hidden" id="touchpad">
  <div class="grp">
    <button class="tbtn" id="tLeft">◀</button>
    <button class="tbtn" id="tRight">▶</button>
  </div>
  <div class="grp">
    <button class="tbtn" id="tJump">⤴</button>
  </div>
</div>

<script src="../js/core.js"></script>
<script src="../js/rig.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const GAME = "adventure";
const RANK_LABELS = ["かんたん", "ふつう", "むずかしい"];
const MODES = {
  auto: { label: "ゆるふわ", auto: true },
  ren:  { label: "れんしゅう" },
  g1: { label: "かんたん",   time: 90, lv: 1 },
  g2: { label: "ふつう",     time: 60, lv: 2 },
  g3: { label: "むずかしい", time: 45, lv: 3 },
};

let selChar = null, selBg = null, G = null;

async function initSelect() {
  const recs = await Store.ensureSamples();
  const chars = recs.filter((r) => r.cat === "char");
  const bgs = recs.filter((r) => r.cat === "bg");
  selChar = chars[0] || null;
  selBg = bgs[0] || null;
  Ui.renderGallery($("charGallery"), chars, (r, el) => {
    selChar = r;
    document.querySelectorAll("#charGallery .thumb").forEach((t) => t.classList.remove("selected"));
    el.classList.add("selected");
  }, selChar && selChar.id);
  Ui.renderGallery($("bgGallery"), bgs, (r, el) => {
    selBg = r;
    document.querySelectorAll("#bgGallery .thumb").forEach((t) => t.classList.remove("selected"));
    el.classList.add("selected");
  }, selBg && selBg.id);
  refreshLocks();
}
initSelect();

function refreshLocks() {
  const lv = Tiers.unlock(GAME);
  document.querySelectorAll("#gachiRow .btn").forEach((b) => {
    const need = MODES[b.dataset.mode].lv;
    if (!b.dataset.orig) b.dataset.orig = b.innerHTML;
    b.classList.toggle("locked", need > lv);
    b.innerHTML = (need > lv ? "🔒 " : "") + b.dataset.orig;
  });
  $("rankView").innerHTML = Tiers.rankHtml(GAME, RANK_LABELS, { unit: "びょう" });
}

/* タッチボタン */
const touch = { left: false, right: false, a: false };
for (const [id, key] of [["tLeft", "left"], ["tRight", "right"], ["tJump", "a"]]) {
  const b = $(id);
  const on = (e) => { e.preventDefault(); touch[key] = true; };
  const off = (e) => { e.preventDefault(); touch[key] = false; };
  b.addEventListener("pointerdown", on);
  b.addEventListener("pointerup", off);
  b.addEventListener("pointercancel", off);
  b.addEventListener("pointerleave", off);
}

let curMode = MODES.ren;
document.querySelectorAll("#selectScreen [data-mode]").forEach((b) => {
  b.onclick = () => {
    const m = MODES[b.dataset.mode];
    if (m.lv && m.lv > Tiers.unlock(GAME)) {
      Sound.bad();
      Ui.msg("まえのだんかいを クリアしてね", 1600, "#4dabf7");
      return;
    }
    if (!selChar) return;
    curMode = m;
    startGame(m);
  };
});
$("againBtn").onclick = () => startGame(curMode);
$("selBtn").onclick = () => {
  $("playScreen").classList.add("hidden");
  $("touchpad").classList.add("hidden");
  $("selectScreen").classList.remove("hidden");
  if (G) G.stop = true;
  refreshLocks();
};

function failGame(g) {
  g.cleared = true;   // タイマー停止・クリア判定も止める
  Sound.bad();
  Ui.msg(`じかんぎれ!⭐${g.got}/10`, 2600, "#9775fa");
  $("clearRow").classList.remove("hidden");
}

async function startGame(mode) {
  Sound.tap();
  curMode = mode;
  if (G) G.stop = true;
  const parts = await Rig.load(selChar);
  const bgImg = selBg ? await Util.loadImage(selBg.dataURL) : null;

  const cv = $("cv"), ctx = cv.getContext("2d");
  const WORLD = 3400, GROUND = 645;
  const puppet = new Puppet(parts, { h: 175 });
  const stars = [];
  for (let i = 0; i < 10; i++) {
    stars.push({
      x: 380 + i * ((WORLD - 700) / 10) + Util.rand(-80, 80),
      y: GROUND - (i % 3 === 2 ? Util.rand(220, 300) : Util.rand(40, 130)),
      got: false, t: Util.rand(0, 6),
    });
  }

  G = {
    stop: false, mode, px: 150, py: GROUND, vy: 0, grounded: true,
    stars, got: 0, cleared: false, prevA: false, t: mode.time || 0,
  };

  $("selectScreen").classList.add("hidden");
  $("playScreen").classList.remove("hidden");
  $("touchpad").classList.toggle("hidden", !!mode.auto);  // オートはボタン不要
  $("clearRow").classList.add("hidden");
  $("starHud").textContent = "⭐ 0 / 10";
  $("timeHud").classList.toggle("hidden", !mode.time);
  if (mode.time) $("timeHud").textContent = `⏰ ${mode.time}`;

  const starCv = Util.emojiCanvas("⭐", 90);
  const flagCv = Util.emojiCanvas("🚩", 160);
  let last = performance.now();
  const g = G;

  (function loop(now) {
    if (g.stop) return;
    const dt = Math.min(0.04, (now - last) / 1000); last = now;

    /* --- じかん(ガチンコ) --- */
    if (g.mode.time && !g.cleared) {
      g.t -= dt;
      $("timeHud").textContent = `⏰ ${Math.ceil(Math.max(0, g.t))}`;
      if (g.t <= 0) { g.t = 0; return failGame(g); }
    }

    /* --- 入力 --- */
    let left, right, jump;
    if (g.mode.auto) {
      // オートプレイ:みぎへ すすみ、たかい ⭐の てまえで ジャンプ
      right = true; left = false; jump = false;
      for (const s of g.stars) {
        if (s.got) continue;
        const dx = s.x - g.px;
        if (dx > 30 && dx < 120 && s.y < GROUND - 150 && g.grounded) { jump = true; break; }
      }
    } else {
      const pad = Pad.read();
      left = pad.left || touch.left;
      right = pad.right || touch.right;
      jump = pad.a || pad.up || touch.a;
    }
    const SPEED = 330;
    let vx = 0;
    if (left) { vx = -SPEED; puppet.facing = -1; }
    if (right) { vx = SPEED; puppet.facing = 1; }
    g.px = Util.clamp(g.px + vx * dt, 60, WORLD - 60);
    puppet.walking = vx !== 0 && g.grounded;

    if (jump && !g.prevA && g.grounded) {
      g.vy = -950; g.grounded = false; Sound.jump();
    }
    g.prevA = jump;
    if (!g.grounded) {
      g.vy += 2400 * dt;
      g.py += g.vy * dt;
      if (g.py >= GROUND) { g.py = GROUND; g.vy = 0; g.grounded = true; }
    }
    puppet.update(dt);

    /* --- あたり判定 --- */
    const pcx = g.px, pcy = g.py - puppet.h / 2;
    for (const s of g.stars) {
      if (s.got) continue;
      s.t += dt;
      if (Math.abs(pcx - s.x) < 60 && Math.abs(pcy - s.y) < 95) {
        s.got = true; g.got++;
        Sound.pop();
        $("starHud").textContent = `⭐ ${g.got} / 10`;
        if (g.got === 10) Ui.msg("ゴールへ いそげ!🚩", 1500, "#ff922b");
      }
    }
    if (g.got === 10 && !g.cleared && g.px > WORLD - 220) {
      g.cleared = true;
      Sound.fanfare();
      Ui.confetti();
      if (g.mode.time) {
        const left = Math.max(0, Math.round(g.t));
        Tiers.setUnlock(GAME, Math.min(3, g.mode.lv + 1));
        Tiers.addRank(GAME, g.mode.lv, (selChar && selChar.name) || "?", left);
        Ui.msg(`クリア!🏆 のこり ${left}びょう`, 2500);
      } else {
        Ui.msg("クリア!🎉", 2500);
      }
      $("clearRow").classList.remove("hidden");
      if (g.mode.auto) setTimeout(() => { if (g && !g.stop && g.mode.auto) startGame(g.mode); }, 3000);
    }

    /* --- 描画 --- */
    const cam = Util.clamp(g.px - 500, 0, WORLD - 1280);
    ctx.clearRect(0, 0, 1280, 720);
    if (bgImg) {
      const off = -(cam * 0.4) % 1280;
      ctx.drawImage(bgImg, off, 0, 1280, 720);
      ctx.drawImage(bgImg, off + 1280, 0, 1280, 720);
    } else {
      ctx.fillStyle = "#d0ebff"; ctx.fillRect(0, 0, 1280, 720);
    }
    ctx.fillStyle = "rgba(116,184,85,.95)";
    ctx.fillRect(0, GROUND + 8, 1280, 720 - GROUND);

    ctx.save();
    ctx.translate(-cam, 0);
    for (const s of g.stars) {
      if (s.got) continue;
      const bob = Math.sin(s.t * 3) * 8;
      ctx.drawImage(starCv, s.x - 45, s.y - 45 + bob);
    }
    if (g.got === 10) ctx.drawImage(flagCv, WORLD - 190, GROUND - 150);
    puppet.x = g.px;
    puppet.y = GROUND;
    puppet.draw(ctx, GROUND - g.py);
    ctx.restore();

    /* すすみぐあいメーター */
    ctx.fillStyle = "rgba(255,255,255,.7)";
    ctx.fillRect(340, 18, 600, 14);
    ctx.fillStyle = "#ff6b9d";
    ctx.fillRect(340, 18, 600 * (g.px / WORLD), 14);

    requestAnimationFrame(loop);
  })(last);
}
</script>
</body>
</html>
