<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>まちがいさがし</title>
<link rel="icon" href="../favicon.svg">
<link rel="stylesheet" href="../css/style.css">
<style>
  .pair {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 6px;
  }
  .pair canvas {
    width: min(46vw, 560px);
    height: auto;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(120,80,40,.22);
    background: #fff;
    touch-action: manipulation;
  }
  @media (max-width: 700px) {
    .pair canvas { width: 92vw; }
  }
</style>
</head>
<body>
<header class="bar">
  <a class="back" href="../index.html">← もどる</a>
  <h1>🔍 まちがいさがし</h1>
  <div class="spacer"></div>
</header>

<main>
  <div id="selectScreen" class="panel">
    <h2>どの えで あそぶ?</h2>
    <div class="gallery" id="gallery"></div>

    <div class="mode-sec">🎵 れんしゅう<span class="tag">じかんむせいげん・のんびり さがす</span></div>
    <div class="row"><button class="btn big blue" data-mode="ren">🎵 のんびり さがす</button></div>

    <div class="mode-sec">🔥 ガチンコ<span class="tag">せいげんじかんない・はやさランキング・クリアで つぎが とけるよ</span></div>
    <div class="row" id="gachiRow">
      <button class="btn big blue"   data-mode="g1">かんたん<br><span style="font-size:14px">40びょう</span></button>
      <button class="btn big orange" data-mode="g2">ふつう<br><span style="font-size:14px">25びょう</span></button>
      <button class="btn big purple" data-mode="g3">むずかしい<br><span style="font-size:14px">15びょう</span></button>
    </div>
    <div class="rank" id="rankView"></div>
    <p class="note">えをえらんでから モードを おしてね。「とりこみ・せってい」で写真を入れて「まちがいスポット」を設定すると、園の写真でも遊べます</p>
  </div>

  <div id="playScreen" class="hidden">
    <div class="hud">
      <span id="found">みつけた: 0</span>
      <span id="left">のこり: ?</span>
      <span id="timeHud" class="hidden">⏰</span>
    </div>
    <p style="text-align:center;font-weight:bold;margin:4px">みぎの えを タッチして まちがいを さがしてね!</p>
    <div class="pair">
      <canvas id="cvL"></canvas>
      <canvas id="cvR"></canvas>
    </div>
    <div class="row">
      <button class="btn yellow" id="hintBtn">💡 ヒント</button>
      <button class="btn gray" id="againBtn">べつの えで あそぶ</button>
    </div>
  </div>
</main>

<script src="../js/core.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const GAME = "diff";
const RANK_LABELS = ["かんたん", "ふつう", "むずかしい"];
const MODES = {
  ren: { label: "れんしゅう" },
  g1: { label: "かんたん",   limit: 40, lv: 1 },
  g2: { label: "ふつう",     limit: 25, lv: 2 },
  g3: { label: "むずかしい", limit: 15, lv: 3 },
};
let G = null, selPic = null;

async function initSelect() {
  const recs = await Store.ensureSamples();
  const pics = recs.filter((r) => r.cat === "pic");
  selPic = pics[0] || null;
  Ui.renderGallery($("gallery"), pics, (r, el) => {
    selPic = r;
    document.querySelectorAll("#gallery .thumb").forEach((t) => t.classList.remove("selected"));
    el.classList.add("selected");
  }, selPic && selPic.id);
  refreshLocks();
}
initSelect();

function refreshLocks() {
  const lv = Tiers.unlock(GAME);
  document.querySelectorAll("#gachiRow .btn").forEach((b) => {
    const need = MODES[b.dataset.mode].lv;
    if (!b.dataset.orig) b.dataset.orig = b.innerHTML;
    b.classList.toggle("locked", need > lv);
    b.innerHTML = (need > lv ? "🔒 " : "") + b.dataset.orig;
  });
  $("rankView").innerHTML = Tiers.rankHtml(GAME, RANK_LABELS, { unit: "びょう" });
}

document.querySelectorAll("#selectScreen [data-mode]").forEach((b) => {
  b.onclick = () => {
    const m = MODES[b.dataset.mode];
    if (m.lv && m.lv > Tiers.unlock(GAME)) {
      Sound.bad();
      Ui.msg("まえのだんかいを クリアしてね", 1600, "#4dabf7");
      return;
    }
    if (!selPic) { Ui.msg("えを えらんでね", 1200, "#4dabf7"); return; }
    Sound.tap();
    startGame(selPic, m);
  };
});

$("againBtn").onclick = () => {
  if (G) G.stop = true;
  $("playScreen").classList.add("hidden");
  $("selectScreen").classList.remove("hidden");
  refreshLocks();
};

async function startGame(rec, mode) {
  if (G) G.stop = true;
  const img = await Util.loadImage(rec.dataURL);
  let spots = (rec.diffSpots || []).map((s) => ({ ...s, found: false }));
  if (!spots.length) {
    // スポット未設定なら自動でつくる(こっそりモード)
    for (let i = 0; i < 5; i++) {
      spots.push({ x: Util.rand(0.15, 0.85), y: Util.rand(0.15, 0.85), r: 0.06, found: false });
    }
  }

  const W = img.width, H = img.height;
  const cvL = $("cvL"), cvR = $("cvR");
  cvL.width = cvR.width = W;
  cvL.height = cvR.height = H;
  cvL.getContext("2d").drawImage(img, 0, 0);

  // 右側:スポット部分を まわりの絵で「うわがき」して消す
  const ctxR = cvR.getContext("2d");
  ctxR.drawImage(img, 0, 0);
  for (const s of spots) {
    const cx = s.x * W, cy = s.y * H, r = s.r * W;
    // まわりから安全な「うつしもと」を決める(画面の中心方向とは逆側から)
    let sx = cx + (cx < W / 2 ? r * 2.4 : -r * 2.4);
    let sy = cy + (cy < H / 2 ? r * 1.6 : -r * 1.6);
    sx = Util.clamp(sx, r, W - r);
    sy = Util.clamp(sy, r, H - r);
    // ふわっとぼかした円形パッチでうわがき(クローンスタンプ)
    const patch = Util.makeCanvas(Math.ceil(r * 2), Math.ceil(r * 2));
    const pctx = patch.getContext("2d");
    pctx.drawImage(img, sx - r, sy - r, r * 2, r * 2, 0, 0, r * 2, r * 2);
    pctx.globalCompositeOperation = "destination-in";
    const grad = pctx.createRadialGradient(r, r, r * 0.55, r, r, r);
    grad.addColorStop(0, "rgba(0,0,0,1)");
    grad.addColorStop(1, "rgba(0,0,0,0)");
    pctx.fillStyle = grad;
    pctx.fillRect(0, 0, r * 2, r * 2);
    ctxR.drawImage(patch, cx - r, cy - r);
  }

  G = { img, spots, W, H, done: false, mode, stop: false, elapsed: 0 };
  $("selectScreen").classList.add("hidden");
  $("playScreen").classList.remove("hidden");
  $("timeHud").classList.toggle("hidden", !mode.limit);
  updateHud();

  // ガチンコ:せいげんじかんの カウントダウン
  if (mode.limit) {
    $("hintBtn").classList.add("hidden");   // ガチンコは ヒントなし
    let last = performance.now();
    (function tick(now) {
      if (G.stop || G.done) return;
      G.elapsed += (now - last) / 1000; last = now;
      const rem = Math.max(0, mode.limit - G.elapsed);
      $("timeHud").textContent = `⏰ ${Math.ceil(rem)}`;
      if (rem <= 0) return failGame();
      requestAnimationFrame(tick);
    })(last);
  } else {
    $("hintBtn").classList.remove("hidden");
  }

  cvR.onpointerdown = (e) => {
    if (G.done) return;
    const p = Util.canvasPos(cvR, e);
    for (const s of G.spots) {
      if (s.found) continue;
      if (Math.hypot(p.x - s.x * W, p.y - s.y * H) < s.r * W * 1.35) {
        s.found = true;
        Sound.pop();
        markSpot(s);
        updateHud();
        if (G.spots.every((q) => q.found)) {
          G.done = true;
          Sound.fanfare();
          Ui.confetti();
          if (G.mode.limit) {
            const secs = Math.max(1, Math.round(G.elapsed));
            Tiers.setUnlock(GAME, Math.min(3, G.mode.lv + 1));
            Tiers.addRank(GAME, G.mode.lv, "?", secs, { lowerIsBetter: true });
            Ui.msg(`クリア!🏆 ${secs}びょう`, 2400);
          } else {
            Ui.msg("ぜんぶ みつけた!", 2200);
          }
        } else {
          Ui.msg("あたり!", 800, "#51cf66");
        }
        return;
      }
    }
    Sound.tap();
  };
}

function failGame() {
  G.done = true;
  Sound.bad();
  const f = G.spots.filter((s) => s.found).length;
  Ui.msg(`じかんぎれ!みつけた ${f}こ`, 2400, "#9775fa");
  // のこりを おしえてあげる
  for (const s of G.spots) if (!s.found) markSpot(s);
}

function markSpot(s) {
  for (const cv of [$("cvL"), $("cvR")]) {
    const ctx = cv.getContext("2d");
    ctx.strokeStyle = "#ff6b9d";
    ctx.lineWidth = Math.max(5, G.W * 0.008);
    ctx.beginPath();
    ctx.arc(s.x * G.W, s.y * G.H, s.r * G.W * 1.15, 0, 7);
    ctx.stroke();
  }
}

function updateHud() {
  const f = G.spots.filter((s) => s.found).length;
  $("found").textContent = `みつけた: ${f}`;
  $("left").textContent = `のこり: ${G.spots.length - f}`;
}

$("hintBtn").onclick = () => {
  if (!G || G.done) return;
  const s = G.spots.find((q) => !q.found);
  if (!s) return;
  Sound.tick();
  const ctx = $("cvR").getContext("2d");
  ctx.save();
  ctx.strokeStyle = "rgba(77,171,247,.8)";
  ctx.setLineDash([12, 10]);
  ctx.lineWidth = Math.max(5, G.W * 0.008);
  ctx.beginPath();
  ctx.arc(s.x * G.W, s.y * G.H, s.r * G.W * 2.2, 0, 7);
  ctx.stroke();
  ctx.restore();
};
</script>
</body>
</html>
