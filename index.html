<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>みんなの ゲームパック</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">
<style>
  .logo {
    display: block;
    margin: 10px auto 0;
    width: min(500px, 82vw);
    height: auto;
    mix-blend-mode: multiply;   /* 白地をパステル背景になじませる */
  }
  .subtitle { text-align: center; margin: 0 0 20px; color: #8a7a68; font-weight: bold; }

  /* ---------- ゲーム一覧(1行5こ・3だん) ----------
     ※ キャッシュ対策でここに直接書き、外部CSSに左右されないようにする */
  .tiles.games {
    grid-template-columns: repeat(5, minmax(0, 1fr));
    max-width: 980px;
  }
  @media (max-width: 860px) {
    .tiles.games { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 560px) {
    .tiles.games { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* ---------- 設定ボタン(おとなのひと用) ----------
     フローティングにせず、通常配置。ゲーム一覧と同じ幅(980px・中央寄せ)の
     バーの中で右端に置き、じゃんけん(1行目の右端)の右端とそろえる。 */
  .settings-bar {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    justify-content: flex-end;
  }
  .settings-fab {
    width: 54px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;                    /* 程よい余白 */
    background: #fff;
    border: 3px solid var(--cream-d);
    border-radius: 50%;              /* 丸 */
    overflow: hidden;                /* 白背景のはみ出しを防ぐ */
    box-shadow: 0 4px 0 var(--cream-d);
    transition: transform .08s, box-shadow .08s;
  }
  .settings-fab img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
  }
  .settings-fab:active { transform: translateY(4px); box-shadow: none; }
  @media (hover: hover) {
    .settings-fab:hover:not(:active) { transform: translateY(2px); box-shadow: 0 2px 0 var(--cream-d); }
  }
</style>
</head>
<body>
<main>
  <div class="settings-bar">
    <a class="settings-fab" href="admin.html" title="とりこみ・せってい(おとなのひとよう)" aria-label="とりこみ・せってい おとなのひとよう">
      <img src="assets/buttons/admin.png" alt="せってい">
    </a>
  </div>
  <h1 style="margin:0"><img class="logo" src="assets/logo.png" alt="みんなの ゲームパック"></h1>
  <p class="subtitle">あそびたい ゲームを えらんでね!</p>

  <div class="tiles games">
    <!-- 1だんめ -->
    <a class="tile" href="draw.html"><img class="icon" src="assets/buttons/draw.png" alt="">おえかき</a>
    <a class="tile" href="games/world.html"><img class="icon" src="assets/buttons/world.png" alt="">みんなの せかい<span class="badges">🌈</span></a>
    <a class="tile" href="games/fukuwarai.html"><img class="icon" src="assets/buttons/fukuwarai.png" alt="">ふくわらい<span class="badges">🌈🎵</span></a>
    <a class="tile" href="games/race.html"><img class="icon" src="assets/buttons/race.png" alt="">よーいドン!<span class="badges">🌈🎵🔥</span></a>
    <a class="tile" href="games/janken.html"><img class="icon" src="assets/buttons/janken.png" alt="">じゃんけん<span class="badges">🌈🎵🔥</span></a>
    <!-- 2だんめ -->
    <a class="tile" href="games/quiz.html"><img class="icon" src="assets/buttons/quiz.png" alt="">４たくクイズ<span class="badges">🎵🔥</span></a>
    <a class="tile" href="games/silhouette.html"><img class="icon" src="assets/buttons/silhouette.png" alt="">かげえクイズ<span class="badges">🌈🎵🔥</span></a>
    <a class="tile" href="games/diff.html"><img class="icon" src="assets/buttons/diff.png" alt="">まちがいさがし<span class="badges">🎵🔥</span></a>
    <a class="tile" href="games/memory.html"><img class="icon" src="assets/buttons/memory.png" alt="">カードあわせ<span class="badges">🌈🎵🔥</span></a>
    <a class="tile" href="games/puzzle.html"><img class="icon" src="assets/buttons/puzzle.png" alt="">おえかきパズル<span class="badges">🌈🎵🔥</span></a>
    <!-- 3だんめ -->
    <a class="tile" href="games/adventure.html"><img class="icon" src="assets/buttons/adventure.png" alt="">おえかきのたび<span class="badges">🌈🎵🔥</span></a>
    <a class="tile" href="games/mole.html"><img class="icon" src="assets/buttons/mole.png" alt="">もぐらたたき<span class="badges">🌈🎵🔥</span></a>

</body>
